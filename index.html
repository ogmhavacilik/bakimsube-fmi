                                                if (!dateStr) return '';
                                                const d = String(dateStr).split(' ')[0];
                                                const parts = d.split('-');
                                                if (parts.length < 3) return dateStr;
                                                return `${parts[2]}-${parts[1]}-${parts[0]}`;
                                            };

                                            let hours = parseFloat(tx.displayHours || tx.hours || (tx.type === TRANSACTION_TYPES.USED ? 8.0 : 0));
                                            
                                            if (isAuto) {
                                                if (isPlannedDuty) {
                                                    const isWk = (() => {
                                                         if (!tx.date) return false;
                                                         const [y, m, d] = tx.date.split(' ')[0].split('-').map(Number);
                                                         const dt = new Date(y, m - 1, d);
                                                         return dt.getDay() === 0 || dt.getDay() === 6;
                                                     })();
                                                    hours = isWk ? 11.0 : 3.0;
                                                } else if (isHolidayStandby) {
                                                    hours = 2.0;
                                                } else if (isStandby) {
                                                    hours = 1.0;
                                                } else if (isFmi) {
                                                    hours = 8.0;
                                                }
                                            }

                                            return (
                                                <div 
                                                    key={tx.id} 
                                                    className={`p-4 ${isPending ? 'bg-amber-900/10 border-amber-500/20' : (isHolidayStandby ? 'bg-fuchsia-950/25 border-fuchsia-800/40 shadow-sm shadow-fuchsia-950/20' : isStandby ? 'bg-violet-950/15 border-violet-800/20' : (isEarned ? 'bg-forest-900/50 border-forest-800' : 'bg-rose-900/10 border-rose-500/10'))} border rounded-2xl flex items-center justify-between group transition-all`}
                                                >
                                                    <div className="flex items-center gap-4 flex-1">
                                                        <div className={`p-3 rounded-xl ${isPending ? 'bg-amber-500/10' : (isHolidayStandby ? 'bg-fuchsia-500/10' : isStandby ? 'bg-violet-500/10' : (isEarned ? (isPlannedDuty ? 'bg-blue-500/10' : 'bg-emerald-500/10') : 'bg-rose-500/10'))}`}>
                                                            <Icon 
                                                                name={isPending ? 'Clock' : (isHolidayStandby ? 'Award' : isStandby ? 'Shield' : (isEarned ? 'ArrowUpRight' : 'ArrowDownRight'))} 
                                                                size={20} 
                                                                className={isPending ? 'text-amber-500' : (isHolidayStandby ? 'text-fuchsia-400' : isStandby ? 'text-violet-400' : (isEarned ? 'text-emerald-400' : 'text-rose-400'))} 
                                                            />
                                                        </div>
                                                        <div>
                                                            <div className="flex items-center gap-2">
                                                                <p className="font-black text-white text-sm uppercase">
                                                                    {tx.description || (isFmi ? 'FMİ İZİN KULLANIMI' : (isHolidayStandby ? 'RESMİ TATİL BEKLEME' : isStandby ? 'BEKLEME' : (isEarned ? 'MESAI KAZANIMI' : 'İZİN KULLANIMI')))}
                                                                </p>
                                                                {isHolidayStandby && <span className="bg-fuchsia-500/20 text-fuchsia-300 text-[9px] font-black px-1.5 py-0.5 rounded border border-fuchsia-500/30 z-10">RESMİ TATİL BEKLEME (+2 Puan)</span>} {isStandby && <span className="bg-violet-500/20 text-violet-300 text-[9px] font-black px-1.5 py-0.5 rounded border border-violet-500/30 z-10">NORMAL BEKLEME (+1 Puan)</span>} {isAuto && (
                                                                    <span className="bg-forest-700 text-[8px] px-1 rounded text-forest-300 font-black uppercase">OTO</span>
                                                                )}
                                                                {isPending && (
                                                                    <span className="bg-amber-500 text-[8px] px-1 rounded text-white font-black uppercase">BEKLEYEN</span>
                                                                )}
                                                            </div>
                                                            <div className="flex items-center gap-3 text-[10px] text-forest-500 font-bold">
                                                                <span className="flex items-center gap-1"><Icon name="Calendar" size={10} /> {formatDate(tx.date)}</span>
                                                                {tx.shift && <span className="flex items-center gap-1"><Icon name="Clock" size={10} /> {tx.shift}</span>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <div className="text-right">
                                                            {editingTxId === tx.id ? (
                                                                <div className="flex flex-col gap-2 items-end">
                                                                    <div className="flex items-center gap-2">
                                                                        <input 
                                                                            type="text"
                                                                            value={editingHours}
                                                                            onChange={(e) => setEditingHours(e.target.value)}
                                                                            className="w-16 bg-forest-800 border border-forest-600 rounded px-2 py-1 text-sm font-black text-white"
                                                                            placeholder="Saat"
                                                                            autoFocus
                                                                        />
                                                                        <button 
                                                                            type="button"
                                                                            onClick={() => handleUpdateHistoryHours(tx, editingHours, editingNote)}
                                                                            className="p-2 bg-emerald-500 rounded-lg text-white hover:bg-emerald-600 shadow-lg shadow-emerald-900/40"
                                                                        >
                                                                            <Icon name="Save" size={14} />
                                                                        </button>
                                                                        <button 
                                                                            type="button"
                                                                            onClick={() => { setEditingTxId(null); setEditingNote(''); }}
                                                                            className="p-2 bg-rose-500 rounded-lg text-white hover:bg-rose-600 shadow-lg shadow-rose-900/40"
                                                                        >
                                                                            <Icon name="X" size={14} />
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="flex items-center gap-3">
                                                                    {adminRole && !isAuto && (
                                                                        <button 
                                                                            type="button"
                                                                            onClick={(e) => {
                                                                                e.stopPropagation();
                                                                                setEditingTxId(tx.id);
                                                                                setEditingHours(String(tx.hours || 0));
                                                                                setEditingNote(tx.note || '');
                                                                            }}
                                                                            className="opacity-0 group-hover:opacity-100 p-2 bg-forest-800 rounded-xl text-forest-400 hover:text-white transition-all font-bold"
                                                                            title="Düzenle"
                                                                        >
                                                                            <Icon name="Edit2" size={14} />
                                                                        </button>
                                                                    )}
                                                                    <div className="flex flex-col items-end">
                                                                        <p className={`font-black text-lg leading-tight ${isPending ? 'text-amber-500' : ((isStandby || isHolidayStandby) ? 'text-purple-400' : (isEarned ? 'text-emerald-400' : 'text-rose-400'))}`}>
                                                                            {isEarned ? '+' : '-'}{hours.toFixed(1)} s
                                                                        </p>
                                                                        {isEarned && Math.abs(parseFloat(tx.displayHours || 0) - parseFloat(tx.hours || 0)) > 0.1 && (
                                                                            <p className="text-[10px] text-forest-500 font-black uppercase mt-0.5">Sisteme Aktarılan: {parseFloat(tx.displayHours).toFixed(1)} s</p>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </>
                        );
                    })()}
                </div>
                        ) : (selectedPerson || modalType) && (
                            <form onSubmit={handleAddOvertime} className="space-y-4">
                                <div className="p-4 bg-blue-500/5 rounded-2xl border border-blue-500/10 mb-4">
                                     <div className="flex items-center justify-between gap-3 mb-2">
                                         <h4 className="text-[10px] font-black text-blue-400 uppercase tracking-widest flex items-center gap-2">
                                             <Icon name="Plane" size={12} /> Hızlı Veri Aktarımı (BELL 429)
                                         </h4>
                                         <button 
                                             type="button"
                                             onClick={() => {
                                                 const data = prompt("BELL 429 formatındaki satırı buraya yapıştırın:");
                                                 if (!data) return;
                                                 const parts = data.trim().split(/\s+/);
                                                 // Format parse
                                                 const typeIdx = parts.findIndex(p => p === 'EARNED' || p === 'USED' || p === 'FMİ' || p === 'FMI' || p === 'KAZANILAN' || p === 'KULLANILAN');
                                                 if (typeIdx >= 6) {
                                                     // Attempt to auto-select person
                                                     const pId = parts[1];
                                                     const pName = parts[2];
                                                     const found = personnel.find(p => 
                                                        String(p.id).toLowerCase() === pId.toLowerCase() || 
                                                        (p.fullName || '').toLocaleUpperCase('tr-TR').includes(pName.toLocaleUpperCase('tr-TR'))
                                                     );
                                                     if (found) setSelectedPerson(found);

                                                      const rawStatus = parts[typeIdx].toUpperCase();
                                                      const isUsed = rawStatus.includes('USED') || rawStatus.includes('FMİ') || rawStatus.includes('FMI') || rawStatus.includes('KULLANILAN');

                                                      const pIdVal = parts[1];
                                                      const foundPerson = personnel.find(p => 
                                                          String(p.id).toLowerCase() === pId.toLowerCase() ||
                                                          String(p.fullName).toLocaleUpperCase('tr-TR').includes(parts[2].toLocaleUpperCase('tr-TR'))
                                                      );
                                                      const foundItem = foundPerson;
                                                      const pIdItem = pIdVal;
                                                      if (foundItem) setSelectedPerson(foundItem);

                                                      const shiftVal = parts[typeIdx + 1] || 'Gündüz';

                                                      setNewTx({
                                                          ...newTx,
                                                          personId: foundItem ? foundItem.id : pIdItem,
                                                          date: parts[typeIdx - 4],
                                                          hours: parseFloat(parts[typeIdx - 1]) || 0,
                                                          days: parseInt(parts[typeIdx - 2]) || 1,
                                                          description: parts.slice(typeIdx + 2, parts.length - 1).join(' ').trim(),
                                                          shift: shiftVal,
                                                          location: parts[parts.length - 1] || 'Deneme',
                                                          type: isUsed ? TRANSACTION_TYPES.USED : TRANSACTION_TYPES.EARNED
                                                      });
                                                     showToast("Veri başarıyla ayrıştırıldı.");
                                                 } else {
                                                     alert("Geçersiz format.");
                                                 }
                                             }}
                                             className="bg-blue-500/20 hover:bg-blue-500/40 text-blue-400 text-[9px] font-black px-4 py-2 rounded-xl border border-blue-500/20 transition-all flex items-center gap-2"
                                         >
                                             <Icon name="Clipboard" size={12} /> VERİYİ AYRIŞTIR
                                         </button>
                                     </div>
                                </div>
                                {isStandbyDay && (
                                    <div className="bg-purple-500/10 border border-purple-500/30 p-4 rounded-xl flex gap-3 animate-pulse">
                                        <Icon name="Info" className="text-purple-400 flex-shrink-0" size={24} />
                                        <p className="text-[11px] text-purple-200 font-bold leading-tight uppercase">
                                            BEKLEME GÖREVİNDESİNİZ: +1 SAAT OTOMATİK EKLENECEKTİR. 18:00'DEN ÖNCE BAŞLATILAN MESAİLERDEN -1 SAAT DÜŞÜLECEKTİR.
                                        </p>
                                    </div>
                                )}
                                <div className="bg-forest-950/50 p-4 rounded-xl border border-forest-700">
                                    {selectedPerson ? (
                                        <div className="flex items-center gap-4">
                                            <PersonnelPhoto photoUrl={selectedPerson.photoUrl} personId={selectedPerson.id} fullName={selectedPerson.fullName} size="w-12 h-12" />
                                            <div>
                                                <p className="text-white font-bold text-lg uppercase">{selectedPerson.fullName}</p>
                                                <p className="text-forest-500 text-xs font-bold uppercase mb-2">
                                                    {selectedPerson.title}
                                                    {(() => {
                                                        const att = getAttendanceRecord(selectedPerson.id, formData.date);
                                                        const status = String(att.status || '').toUpperCase();
                                                        const note = att.note || '';
                                                        if (status === 'DİĞER' && note) {
                                                            return <span className="ml-2 text-amber-400/70 lowercase italic">({note})</span>;
                                                        }
                                                        return null;
                                                    })()}
                                                </p>
                                                {(() => {
                                                    const att = getAttendanceRecord(selectedPerson.id, formData.date);
                                                    if (att.status?.toUpperCase() === 'GÖREV' || att.status?.toUpperCase() === 'GÖREVLİ') {
                                                        return (
                                                            <div className="flex items-center gap-2 mb-2 animate-fade-in">
                                                                <span className="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded font-black border border-blue-500/30 uppercase">
                                                                    GÖREVDE: {att.location || 'BİLİNMİYOR'}
                                                                </span>
                                                            </div>
                                                        );
                                                    }
                                                    return null;
                                                })()}
                                                {modalType === 'use' && stats[selectedPerson.id] && (
                                                    <div className="flex flex-wrap items-center gap-2 mt-2">
                                                        <div className="bg-amber-500/20 border border-amber-500/30 px-3 py-1.5 rounded-lg flex flex-col">
                                                            <span className="text-[8px] font-black text-amber-500 uppercase leading-none">MESAİ HAKKI</span>
                                                            <span className="text-sm font-black text-white leading-tight">{stats[selectedPerson.id].balance} SAAT</span>
                                                        </div>
                                                        <div className="bg-forest-600/20 border border-forest-500/30 px-3 py-1.5 rounded-lg flex flex-col">
                                                            <span className="text-[8px] font-black text-forest-400 uppercase leading-none">İZİN KARŞILIĞI</span>
                                                            <span className="text-sm font-black text-white leading-tight">
                                                                {Math.floor(stats[selectedPerson.id].balance / 8)} GÜN {stats[selectedPerson.id].balance % 8 > 0 ? `${stats[selectedPerson.id].balance % 8} SAAT` : ''}
                                                            </span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-2 max-w-sm mx-auto">
                                            <div className="flex flex-col gap-0.5 items-center">
                                                <label className="block text-[10px] font-black text-forest-400 uppercase">Personel Bul ve Seç</label>
                                                <p className="text-[9px] text-rose-400/80 font-bold uppercase flex items-center gap-1">
                                                    <Icon name="AlertCircle" size={10} />
                                                    Tarih, Saat/Gün ve Açıklama Zorunludur
                                                </p>
                                            </div>
                                            <div className="relative px-6">
                                                <div className="absolute inset-y-0 left-9 flex items-center pointer-events-none">
                                                    <Icon name="Search" size={12} className="text-forest-600" />
                                                </div>
                                                <input 
                                                    type="text"
                                                    placeholder="İsim ile ara..."
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    className={`w-full bg-forest-900 border ${validationErrors.includes('personId') ? 'border-rose-500 animate-shake' : 'border-forest-800'} rounded-xl pl-8 pr-4 py-1.5 text-white text-xs focus:ring-1 focus:ring-forest-500 outline-none transition-all shadow-inner`}
                                                />
                                            </div>
                                        {searchTerm.length >= 1 ? (
                                            <div className="max-h-48 overflow-y-auto bg-forest-950/50 rounded-xl p-1 space-y-1 mb-1 border border-forest-800/30">
                                                {displayPersonnel
                                                    .filter(p => isPersonnelInGroup(p, adminRole))
                                                    .filter(p => p.fullName.toLocaleUpperCase('tr-TR').includes(searchTerm.toLocaleUpperCase('tr-TR')))
                                                    .slice(0, 10)
                                                    .map(p => (
                                                        <button
                                                            key={p.id}
                                                            type="button"
                                                            onClick={() => {
                                                                setFormData({...formData, personId: p.id});
                                                                setSearchTerm(p.fullName);
                                                            }}
                                                            className={`w-full text-left px-4 py-3 rounded-lg text-sm transition-all flex items-center justify-between group ${formData.personId === p.id ? 'bg-forest-600 text-white shadow-lg' : 'text-forest-400 hover:bg-forest-800 hover:text-forest-200'}`}
                                                        >
                                                            <div 
                                                                className="flex items-center gap-3 cursor-help group/sitem"
                                                                onMouseEnter={(e) => {
                                                                    if (p.photoUrl) {
                                                                        setHoverPhoto({ url: p.photoUrl, personId: p.id });
                                                                        setMousePos({ x: e.clientX, y: e.clientY });
                                                                    }
                                                                }}
                                                                onMouseMove={(e) => {
                                                                    setMousePos({ x: e.clientX, y: e.clientY });
                                                                }}
                                                                onMouseLeave={() => setHoverPhoto(null)}
                                                            >
                                                                <PersonnelPhoto photoUrl={p.photoUrl} personId={p.id} fullName={p.fullName} size="w-7 h-7" />
                                                                <div className="flex flex-col">
                                                                    <span className="font-bold group-hover/sitem:text-white transition-colors uppercase">{p.fullName}</span>
                                                                    {(() => {
                                                                        const checkDate = formData.date || getIstanbulToday();
                                                                        const att = getAttendanceRecord(p.id, checkDate);
                                                                        const status = String(att.status || '').toUpperCase();
                                                                        const isDuty = status === 'GÖREV' || status === 'GÖREVLİ';
                                                                        const isPermit = status === 'İZİN' || status === 'İZİNLİ' || status === 'İDARİ İZİN';
                                                                        
                                                                        return (
                                                                            <div className="flex flex-col gap-0.5">
                                                                                {modalType === 'use' && stats[p.id] && (
                                                                                    <span className="text-[9px] text-amber-500 font-bold uppercase">Kalan: {stats[p.id].balance} S ({Math.floor(stats[p.id].balance / 8)}G {stats[p.id].balance % 8}S)</span>
                                                                                )}
                                                                                <div className="flex items-center gap-2">
                                                                                    <span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded ${
                                                                                        isDuty ? 'bg-blue-500/20 text-blue-400' : 
                                                                                        isPermit ? 'bg-amber-500/20 text-amber-400' : 
                                                                                        status === 'MEVCUT' ? 'bg-green-500/20 text-green-400' : 
                                                                                        'bg-forest-800 text-forest-400'
                                                                                    }`}>
                                                                                        {status === 'DİĞER' && att.note ? `${status} (${att.note})` : (status || 'MEVCUT')}
                                                                                    </span>
                                                                                    {isDuty && att.location && (
                                                                                        <span className="text-[9px] text-blue-300 font-bold uppercase truncate max-w-[100px]">
                                                                                            <Icon name="MapPin" size={8} className="inline mr-1" />
                                                                                            {att.location}
                                                                                        </span>
                                                                                    )}
                                                                                </div>
                                                                            </div>
                                                                        );
                                                                    })()}
                                                                </div>
                                                            </div>
                                                            <span className="text-[10px] opacity-40 uppercase font-black group-hover:opacity-100 transition-opacity">{p.title}</span>
                                                        </button>
                                                    ))}
                                            </div>
                                        ) : (
                                            <div className="max-h-48 overflow-y-auto bg-forest-950/50 rounded-xl p-1 space-y-1 mb-1 border border-forest-800/30">
                                                <div className="p-8 text-center text-forest-700 text-xs flex flex-col items-center gap-2">
                                                    <Icon name="Search" size={24} className="opacity-20" />
                                                    <span>Personel bulmak için yazmaya başlayın...</span>
                                                </div>
                                            </div>
                                        )}
                                        </div>
                                    )}
                                </div>

                                {/* Status Info */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className={`${modalType === 'use' ? 'col-span-2' : ''} bg-blue-500/10 border border-blue-500/20 p-3 rounded-xl flex flex-col gap-2`}>
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                <Icon name="Info" size={14} className="text-blue-400" />
                                                <div className="flex flex-col">
                                                    <p className="text-[10px] font-bold text-blue-200">Yoklama Bilgisi</p>
                                                    <p className="text-[8px] text-forest-500 font-bold uppercase">{formData.date === getIstanbulToday() ? 'Bugünkü Durum' : 'Seçilen Tarih Durumu'}</p>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-1">
                                                <span className={`px-2 py-0.5 rounded-full text-[9px] font-black uppercase ring-1 ${(() => {
                                                    const recToday = getAttendanceRecord(selectedPerson?.id || formData.personId, getIstanbulToday());
                                                    const status = String(recToday.status || '').toUpperCase();
                                                    const note = String(recToday.note || '').toUpperCase();
                                                    const loc = String(recToday.location || '').toUpperCase();
                                                    if (status === 'BEKLEME' || note.includes('BEKLEME') || (loc.includes('BEKLEME') && status !== 'İZİNLİ')) return 'bg-purple-500 text-white ring-purple-400 animate-bounce';
                                                    if (status === 'MEVCUT') return 'bg-green-500/20 text-green-400 ring-green-500/30';
                                                    if (status === 'GÖREVLİ' || status === 'GÖREV') return 'bg-blue-500/20 text-blue-400 ring-blue-500/30';
                                                    return 'bg-amber-500/20 text-amber-400 ring-amber-500/30';
                                                })()}`}>
                                                    BUGÜN: {getCurrentAttendanceStatus(selectedPerson?.id || formData.personId, getIstanbulToday())}
                                                </span>
                                                {formData.date && formData.date !== getIstanbulToday() && (
                                                    <span className={`px-2 py-0.5 rounded-full text-[9px] font-black uppercase ring-1 ${(() => {
                                                        const recSel = getAttendanceRecord(selectedPerson?.id || formData.personId, formData.date);
                                                        const status = String(recSel.status || '').toUpperCase();
                                                        if (status === 'MEVCUT') return 'bg-green-500/20 text-green-400 ring-green-500/30';
                                                        if (status === 'GÖREVLİ' || status === 'GÖREV') return 'bg-blue-500/20 text-blue-400 ring-blue-500/30';
                                                        if (status === 'BEKLEME') return 'bg-purple-500/20 text-purple-400 ring-purple-500/30';
                                                        return 'bg-amber-500/20 text-amber-400 ring-amber-500/30';
                                                    })()}`}>
                                                        {formData.date}: {getCurrentAttendanceStatus(selectedPerson?.id || formData.personId, formData.date)}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                        {(() => {
                                            const activeDate = formData.date || getIstanbulToday();
                                            const rec = getAttendanceRecord(selectedPerson?.id || formData.personId, activeDate);
                                            const status = String(rec.status || '').toUpperCase();
                                            const isDuty = status === 'GÖREVLİ' || status === 'GÖREV';
                                            if (isDuty) {
                                                return (
                                                    <div className="mt-2 p-2 bg-blue-500/5 border border-blue-500/10 rounded-lg flex flex-col gap-1 items-start">
                                                        <div className="flex items-center gap-1.5 px-2">
                                                            <Icon name="MapPin" size={12} className="text-blue-400" />
                                                            <span className="text-[10px] font-black text-blue-400 uppercase">GÖREV YERİ: {rec.location || 'BELİRTİLMEMİŞ'}</span>
                                                        </div>
                                                    </div>
                                                );
                                            }
                                            return null;
                                        })()}
                                    </div>
                                    {modalType === 'add' && (
                                        <div className="bg-forest-800/20 border border-forest-700/50 p-2 rounded-xl flex flex-col justify-center">
                                            <label className="text-[9px] font-black text-forest-500 uppercase mb-1 ml-1">Gün Tipi</label>
                                            <select 
                                                value={formData.dayType}
                                                onChange={(e) => setFormData({...formData, dayType: e.target.value})}
                                                className="bg-transparent text-[10px] font-black text-forest-200 outline-none uppercase"
                                            >
                                                <option value="" className="bg-forest-950">SEÇİNİZ...</option>
                                                {Object.values(DAY_TYPES).map(v => <option key={v} value={v} className="bg-forest-950">{v}</option>)}
                                            </select>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-4">
                                    {modalType === 'add' ? (
                                        <>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="relative group">
                                                    <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Mesai Türü</label>
                                                    <div className="w-full bg-forest-900 border border-forest-800 rounded-xl px-4 py-3 text-white flex items-center justify-between opacity-80">
                                                        <span className="font-bold">{formData.shift}</span>
                                                        <Icon name={formData.shift === 'Gece' ? 'Moon' : 'Sun'} size={14} className={formData.shift === 'Gece' ? 'text-blue-400' : 'text-amber-400'} />
                                                    </div>
                                                    <div className="absolute top-0 right-0 -mt-2 group-hover:block hidden bg-forest-800 text-[8px] p-1 rounded font-bold text-forest-400">OTOMATİK</div>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Tarih</label>
                                                    <input 
                                                        type="date" 
                                                        required
                                                        value={formData.date}
                                                        onChange={(e) => setFormData({...formData, date: e.target.value})}
                                                        className={`w-full bg-forest-950 border ${validationErrors.includes('date') ? 'border-rose-500 animate-shake' : 'border-forest-700'} rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-forest-500 outline-none transition-all`}
                                                    />
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Başlangıç Saati</label>
                                                    <input 
                                                        type="time" 
                                                        required
                                                        value={formData.startTime}
                                                        onChange={(e) => setFormData({...formData, startTime: e.target.value})}
                                                        className={`w-full bg-forest-950 border ${validationErrors.includes('startTime') ? 'border-rose-500 animate-shake' : 'border-forest-700'} rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-forest-500 outline-none transition-all`}
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Bitiş Saati</label>
                                                    <input 
                                                        type="time" 
                                                        required
                                                        value={formData.endTime}
                                                        onChange={(e) => setFormData({...formData, endTime: e.target.value})}
                                                        className={`w-full bg-forest-950 border ${validationErrors.includes('endTime') ? 'border-rose-500 animate-shake' : 'border-forest-700'} rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-forest-500 outline-none transition-all`}
                                                    />
                                                </div>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="space-y-4 animate-fade-in">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-[10px] font-black text-forest-400 uppercase mb-1.5 ml-1">İzin Başlangıç Tarihi</label>
                                                    <input 
                                                        type="date" 
                                                        required
                                                        value={formData.date}
                                                        onChange={(e) => setFormData({...formData, date: e.target.value})}
                                                        className={`w-full bg-forest-950 border ${validationErrors.includes('date') ? 'border-rose-500 animate-shake' : 'border-forest-700'} rounded-xl px-4 py-2.5 text-white text-sm focus:ring-2 focus:ring-forest-500 outline-none transition-all`}
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-black text-forest-400 uppercase mb-1.5 ml-1">İzin Bitiş Tarihi</label>
                                                    <input 
                                                        type="date" 
                                                        required
                                                        value={formData.endDate}
                                                        min={formData.date}
                                                        onChange={(e) => setFormData({...formData, endDate: e.target.value})}
                                                        className={`w-full bg-forest-950 border ${validationErrors.includes('endDate') ? 'border-rose-500 animate-shake' : 'border-forest-700'} rounded-xl px-4 py-2.5 text-white text-sm focus:ring-2 focus:ring-forest-500 outline-none transition-all`}
                                                    />
                                                </div>
                                            </div>
                                            <div className="flex flex-col">
                                                <label className="block text-[10px] font-black text-forest-400 uppercase mb-1.5 ml-1">Kullanılacak Gün Sayısı</label>
                                                <div className="relative">
                                                    <input 
                                                        type="number" 
                                                        readOnly
                                                        value={formData.days}
                                                        className="w-full bg-forest-900/50 border border-forest-800 rounded-xl px-4 py-3 text-forest-200 focus:ring-2 focus:ring-forest-500 outline-none transition-all font-black text-xl cursor-not-allowed"
                                                    />
                                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-black text-forest-600 uppercase">GÜN</span>
                                                </div>
                                                <p className="text-[10px] text-forest-500 font-bold mt-1.5 px-1 uppercase tracking-tighter italic">
                                                    * Her gün için 8 saat mesai bakiyesinden düşülecektir.
                                                </p>
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">
                                            {modalType === 'add' ? 'Hesaplanan Süre (Saat)' : 'Toplam Düşülecek Süre'}
                                        </label>
                                        <div className={`w-full bg-forest-900 border ${validationErrors.includes('hours') ? 'border-rose-500 animate-shake' : 'border-forest-700'} rounded-xl px-4 py-3 text-emerald-400 font-black text-xl flex items-center justify-center transition-all`}>
                                            {modalType === 'use' ? `${formData.days || '0'} Gün (${(parseFloat(formData.days || 0) * 8).toFixed(1)} Saat)` : `${formData.hours || '0.0'} Saat Mesai`}
                                        </div>
                                        {modalType === 'use' && (
                                            <p className="text-[10px] text-amber-500/70 font-bold uppercase mt-1 ml-1">
                                                * Seçilen tarihler arası toplam {formData.days} gün FMİ kullanımı olarak işlenecektir.
                                            </p>
                                        )}
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Açıklama</label>
                                        <textarea 
                                            placeholder="Mesai gerekçesi veya lokasyon bilgisi..."
                                            value={formData.description}
                                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                                            className={`w-full bg-forest-950 border ${validationErrors.includes('description') ? 'border-rose-500 animate-shake' : 'border-forest-700'} rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-forest-500 outline-none transition-all h-20 resize-none text-sm`}
                                        ></textarea>
                                    </div>
                                </div>

                                <div className="pt-2 flex gap-3">
                                     <button 
                                        type="button"
                                        onClick={() => { setModalType(null); setSelectedPerson(null); setSearchTerm(''); setSelectedPendingTx(null); }}
                                        className="flex-1 bg-forest-800 text-forest-300 py-3.5 rounded-xl font-bold hover:bg-forest-700 transition-all border border-forest-700"
                                    >
                                        İPTAL
                                    </button>
                                    {selectedPendingTx && (
                                        <button 
                                            type="button"
                                            onClick={async () => {
                                                const success = await rejectTransaction(selectedPendingTx.id);
                                                if (success) {
                                                    setModalType(null);
                                                    setSelectedPerson(null);
                                                    setSelectedPendingTx(null);
                                                    setSearchTerm('');
                                                }
                                            }}
                                            className="flex-1 bg-rose-600 hover:bg-rose-500 text-white font-black py-3.5 rounded-xl transition-all uppercase text-[10px] border border-rose-400 shadow-lg shadow-rose-900/40"
                                        >
                                            REDDET
                                        </button>
                                    )}
                                    <button 
                                        type="submit"
                                        className={`flex-1 ${modalType === 'add' ? 'bg-forest-500 shadow-forest-500/20' : 'bg-amber-600 shadow-amber-600/20'} text-white py-3.5 rounded-xl font-black shadow-lg hover:scale-[1.02] active:scale-95 transition-all text-sm uppercase tracking-widest`}
                                    >
                                        {selectedPendingTx ? 'KONTROL EDİLDİ VE ONAYLA' : 'KAYDET VE ONAYLA'}
                                    </button>
                                </div>
                            </form>
                        )}
                    </Modal>

                    {/* Footer / Floating Back Button */}
                    <footer className="mt-12 text-center flex flex-col items-center gap-4">
                        <p className="text-forest-700 text-[10px] font-bold uppercase tracking-[0.2em] animate-pulse">&copy; 2024 Havacılık Yönetim ve Takip Sistemi</p>
                    </footer>

                    {/* Photo Hover Preview Overlay */}
                    {hoverPhoto && (
                        <div 
                            className="fixed z-[9999] pointer-events-none border-4 border-forest-500 rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.9)] overflow-hidden animate-fade-in bg-forest-900 flex items-center justify-center"
                            style={{ 
                                left: Math.min(mousePos.x + 20, window.innerWidth - 220), 
                                top: Math.min(mousePos.y - 100, window.innerHeight - 220),
                                width: '200px',
                                height: '200px'
                            }}
                        >
                            <SafeImage src={hoverPhoto.url} personId={hoverPhoto.personId} className="personnel-photo-square" />
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[10000] animate-slide-up">
                            <div className={`px-8 py-4 rounded-2xl shadow-2xl border-2 flex items-center gap-4 bg-forest-950/90 backdrop-blur-xl ${toast.type === 'error' ? 'border-rose-500 text-rose-500' : 'border-emerald-500 text-emerald-500'}`}>
                                <Icon name={toast.type === 'error' ? 'AlertCircle' : 'CheckCircle2'} size={24} />
                                <span className="font-black uppercase tracking-widest text-sm">{toast.message}</span>
                            </div>
                        </div>
                    )}

                    {/* Native-Bypass Custom Confirmation Dialog */}
                    {confirmDialog && (
                        <div className="fixed inset-0 z-[10100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in" id="custom-confirm-modal">
                            <div className="bg-forest-900 border-2 border-forest-600/50 w-full max-w-md rounded-2xl shadow-[0_0_80px_rgba(0,0,0,0.95)] overflow-hidden animate-slide-up">
                                <div className="px-6 py-5 border-b border-forest-800 bg-forest-950/40">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2.5 bg-amber-500/10 text-amber-400 rounded-xl border border-amber-500/20">
                                            <Icon name="HelpCircle" size={20} />
                                        </div>
                                        <h3 className="font-extrabold text-lg text-white tracking-wide">İşlem Onayı</h3>
                                    </div>
                                </div>
                                <div className="p-6">
                                    <p className="text-forest-200 text-sm font-medium leading-relaxed">{confirmDialog.message}</p>
                                </div>
                                <div className="px-6 py-4 bg-forest-950/50 border-t border-forest-800/80 flex items-center justify-end gap-3">
                                    <button 
                                        onClick={() => setConfirmDialog(null)}
                                        className="px-4 py-2 bg-forest-800 hover:bg-forest-750 text-forest-300 hover:text-white rounded-xl text-xs font-black transition-all border border-forest-700/50"
                                        id="confirm-cancel-btn"
                                    >
                                        HAYIR, İPTAL ET
                                    </button>
                                    <button 
                                        onClick={async () => {
                                            const cb = confirmDialog.onConfirm;
                                            setConfirmDialog(null);
                                            await cb();
                                        }}
                                        className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-black shadow-lg shadow-emerald-900/40 hover:shadow-emerald-900/60 transition-all flex items-center gap-1.5"
                                        id="confirm-approve-btn"
                                    >
                                        <Icon name="Check" size={14} /> EVET, ONAYLA
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
