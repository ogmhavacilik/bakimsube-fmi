                                                                </td>
                                                                <td className="px-2 py-4 text-center text-[10px] bg-purple-950/20 border-r border-forest-800/10 whitespace-nowrap">
                                                                    {(() => {
                                                                        const att = getAttendanceRecord(p.id, selectedDate || formatDateLocal(new Date()));
                                                                        const status = att.status || 'Mevcut';
                                                                        const sUpper = status.toUpperCase();
                                                                        let colorClass = "text-purple-400";
                                                                        if (sUpper === 'MEVCUT') colorClass = "text-emerald-400 font-bold border border-emerald-500/20 bg-emerald-500/5 rounded px-1";
                                                                        if (sUpper.includes('GÖREV') || sUpper.includes('GOREV')) colorClass = "text-amber-500 font-bold border border-amber-500/20 bg-amber-500/5 rounded px-1";
                                                                        return <span className={colorClass}>{status}</span>;
                                                                    })()}
                                                                </td>
                                                                
                                                                <td className="px-1 py-4 text-center text-[10px] text-forest-400 border-l border-forest-800/50">{wkdayData.day.toFixed(1)}</td>
                                                                <td className="px-1 py-4 text-center text-[10px] text-blue-400/60">{wkdayData.night.toFixed(1)}</td>
                                                                <td className="px-1 py-4 text-center text-[10px] text-emerald-400 font-bold bg-emerald-500/5">{pWkday.toFixed(1)}</td>

                                                                <td className="px-1 py-4 text-center text-[10px] text-amber-500/50">{wkendData.day.toFixed(1)}</td>
                                                                <td className="px-1 py-4 text-center text-[10px] text-blue-400/60">{wkendData.night.toFixed(1)}</td>
                                                                <td className="px-1 py-4 text-center text-[10px] text-emerald-400 font-bold bg-emerald-500/5">{pWkend.toFixed(1)}</td>

                                                                <td className="px-1 py-4 text-center text-[10px] text-rose-500/50">{holidData.day.toFixed(1)}</td>
                                                                <td className="px-1 py-4 text-center text-[10px] text-blue-400/60">{holidData.night.toFixed(1)}</td>
                                                                <td className="px-1 py-4 text-center text-[10px] text-emerald-400 font-bold bg-emerald-500/5 border-r border-forest-800/50">{pHolid.toFixed(1)}</td>

                                                                <td className="px-2 py-4 text-center text-[11px] text-blue-300 bg-blue-900/5">{s.plannedDutyWeekday?.days || 0}</td>
                                                                <td className="px-2 py-4 text-center text-[11px] text-blue-400 font-black bg-blue-900/10 border-r border-blue-900/20">{s.plannedDutyWeekday?.hours || 0}s</td>
                                                                <td className="px-2 py-4 text-center text-[11px] text-blue-300 bg-blue-900/5">{s.plannedDutyWeekend?.days || 0}</td>
                                                                <td className="px-2 py-4 text-center text-[11px] text-blue-400 font-black bg-blue-900/10 border-r border-forest-800/10">{s.plannedDutyWeekend?.hours || 0}s</td>

                                                                <td className="px-1.5 py-4 text-center text-[10px] text-purple-300 bg-purple-950/5 border-r border-purple-900/10">{s.standby || 0}</td>
                                                                <td className="px-1.5 py-4 text-center text-[10px] text-purple-300 font-black bg-purple-950/10 border-r border-purple-900/10">{s.standby || 0}</td>
                                                                <td className="px-1.5 py-4 text-center text-[10px] text-purple-300 bg-purple-950/5 border-r border-purple-900/10">{Math.round(s.holidayStandby / 2) || 0}</td>
                                                                <td className="px-1.5 py-4 text-center text-[10px] text-purple-300 font-black bg-purple-950/10 border-r border-purple-900/10">{s.holidayStandby || 0}</td>
                                                                <td className="px-2 py-4 text-center font-black text-blue-400 bg-purple-950/20 border-r border-forest-800/10">{(s.standby + s.holidayStandby).toFixed(1)}</td>

                                                                <td className="px-4 py-4 text-center font-black text-blue-300 bg-blue-500/5 whitespace-nowrap text-[10px]">
                                                                    {(s.earned / 8).toFixed(1)} g
                                                                </td>
                                                                <td className="px-4 py-4 text-center font-black text-amber-500/80 text-[10px] whitespace-nowrap bg-amber-500/5">
                                                                    {Math.floor(s.used / 8)}G {(s.used % 8).toFixed(1)}S
                                                                </td>
                                                                <td className="px-4 py-4 text-center bg-emerald-500/5">
                                                                    <span className="text-emerald-400 font-black text-xs">
                                                                        {s.balance.toFixed(1)}
                                                                    </span>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* Multiplier Info Legend */}
                                    <div className="mt-8 p-6 bg-forest-950/80 border border-forest-700/50 rounded-2xl">
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="p-2 bg-emerald-500/10 rounded-lg">
                                                <Icon name="Info" size={18} className="text-emerald-400" />
                                            </div>
                                            <h4 className="font-black text-white text-sm uppercase tracking-widest">Skor Hesaplama Bilgilendirmesi</h4>
                                        </div>
                                        <p className="text-xs text-forest-400 mb-6 leading-relaxed">
                                            Teknik ekip (Teknisyen ve Tekniker) personeli için mesai saatleri gün tipine göre çarpanla puanlanır. Diğer personel için çarpan 1.0x olarak uygulanır.
                                        </p>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                            <div className="bg-forest-900/50 p-4 rounded-xl border border-forest-800 flex items-center justify-between">
                                                <span className="text-xs font-bold text-forest-300">Hafta İçi</span>
                                                <span className="bg-forest-800 px-2 py-1 rounded text-[10px] font-black text-white">1.0x</span>
                                            </div>
                                            <div className="bg-amber-500/5 p-4 rounded-xl border border-amber-500/20 flex items-center justify-between">
                                                <span className="text-xs font-bold text-amber-200">Hafta Sonu</span>
                                                <span className="bg-amber-600 px-2 py-1 rounded text-[10px] font-black text-white">1.5x</span>
                                            </div>
                                            <div className="bg-rose-500/5 p-4 rounded-xl border border-rose-500/20 flex items-center justify-between">
                                                <span className="text-xs font-bold text-rose-200">Resmi Tatil</span>
                                                <span className="bg-rose-600 px-2 py-1 rounded text-[10px] font-black text-white">2.0x</span>
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        </div>
                    )}

                    {/* Live Data Pull Update Modal */}
                    <Modal
                        isOpen={updateNotice !== null}
                        onClose={handleDismissUpdateNotice}
                        title="Yoklamadan Veriler Güncellendi"
                    >
                        <div className="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                            <div className="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl flex items-start gap-3">
                                <Icon name="CheckCircle" className="text-emerald-400 shrink-0 mt-0.5" size={20} />
                                <div className="text-xs text-forest-200">
                                    <p className="font-bold text-sm text-white mb-1">Yeni Veriler Başarıyla Çekildi</p>
                                    <p className="opacity-90">Veri tabanında yapılan güncellemeler canlı olarak sayfanıza aktarıldı. Kalan süre sıfırlandı.</p>
                                </div>
                            </div>

                            {updateNotice?.attendance && updateNotice.attendance.length > 0 && (
                                <div className="space-y-2">
                                    <h4 className="text-xs font-black text-amber-400 uppercase tracking-widest flex items-center gap-1.5 px-1">
                                        <Icon name="CalendarRange" size={14} />
                                        Yoklama Değişiklikleri ({updateNotice.attendance.length})
                                    </h4>
                                    <div className="bg-forest-950/40 rounded-xl p-3 border border-forest-800/40 divide-y divide-forest-800/30 text-xs">
                                        {updateNotice.attendance.map((att, idx) => {
                                            const person = personnel.find(p => p.id === att.personId);
                                            const name = person ? person.fullName : att.personId;
                                            return (
                                                <div key={idx} className="py-2 first:pt-0 last:pb-0 flex items-center justify-between gap-2">
                                                    <div>
                                                        <span className="font-bold text-white block uppercase">{name}</span>
                                                        <span className="text-[10px] text-forest-400 font-mono">{att.date}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${att.isNew ? 'bg-emerald-500/15 text-emerald-400' : 'bg-blue-500/15 text-blue-400'}`}>
                                                            {att.isNew ? `YENİ KAYIT: ${att.status}` : `${att.oldStatus} ➔ ${att.status}`}
                                                        </span>
                                                        {att.location && (
                                                            <div className="text-[9px] text-zinc-400 font-black uppercase mt-0.5">📍 {att.location}</div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {updateNotice?.transactions && updateNotice.transactions.length > 0 && (
                                <div className="space-y-2">
                                    <h4 className="text-xs font-black text-amber-400 uppercase tracking-widest flex items-center gap-1.5 px-1">
                                        <Icon name="ClipboardList" size={14} />
                                        Mesai İşlem Değişiklikleri ({updateNotice.transactions.length})
                                    </h4>
                                    <div className="bg-forest-950/40 rounded-xl p-3 border border-forest-800/40 divide-y divide-forest-800/30 text-xs">
                                        {updateNotice.transactions.map((tx, idx) => {
                                            const person = personnel.find(p => p.id === tx.personId);
                                            const name = person ? person.fullName : (tx.personName || tx.personId);
                                            return (
                                                <div key={idx} className="py-2 first:pt-0 last:pb-0 flex items-center justify-between gap-2">
                                                    <div>
                                                        <span className="font-bold text-white block uppercase">{name}</span>
                                                        <span className="text-[10px] text-forest-400 font-mono">{tx.date} • {tx.hours} Saat</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${tx.isStatusChange ? 'bg-orange-500/15 text-orange-400' : 'bg-amber-500/15 text-amber-400'}`}>
                                                            {tx.isStatusChange ? `DURUM: ${tx.oldStatus} ➔ ${tx.status}` : `${tx.type === 'EARNED' ? 'MESAİ KAZANIMI' : 'İZİN KULLANIMI'} (${tx.status})`}
                                                        </span>
                                                        <p className="text-[10px] text-zinc-400 tracking-tight block mt-0.5 italic truncate max-w-[200px]" title={tx.description}>
                                                            {tx.description || 'Açıklama yok'}
                                                        </p>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            <button
                                onClick={handleDismissUpdateNotice}
                                className="w-full bg-forest-600 text-white font-black py-3 rounded-xl shadow-lg hover:bg-forest-500 active:scale-95 transition-all text-xs uppercase tracking-widest mt-2"
                            >
                                TAMAM
                            </button>
                        </div>
                    </Modal>

                    {/* Admin Login Modal */}
                    <Modal isOpen={showLogin} onClose={() => setShowLogin(false)} title="Yönetici Girişi">
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Kullanıcı Adı</label>
                                <input 
                                    type="text" 
                                    required
                                    value={loginData.username}
                                    onChange={(e) => setLoginData({...loginData, username: e.target.value})}
                                    className="w-full bg-forest-950 border border-forest-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-forest-500 outline-none transition-all"
                                    placeholder="Kullanıcı adını giriniz"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Şifre</label>
                                <input 
                                    type="password" 
                                    required
                                    value={loginData.password}
                                    onChange={(e) => setLoginData({...loginData, password: e.target.value})}
                                    className="w-full bg-forest-950 border border-forest-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-forest-500 outline-none transition-all"
                                    placeholder="Şifrenizi giriniz"
                                />
                            </div>
                            <button type="submit" className="w-full bg-forest-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-forest-500 transition-all active:scale-95">
                                GİRİŞ YAP
                            </button>
                        </form>
                    </Modal>

                    {/* Transaction Modal */}
                    <Modal 
                        isOpen={modalType !== null} 
                        onClose={() => { setModalType(null); setSelectedPerson(null); setSearchTerm(''); setSelectedPendingTx(null); }} 
                        sizeCls={modalType === 'history' ? 'max-w-3xl' : 'max-w-md'}
                        title={
                            modalType === 'history' ? (selectedPerson?.fullName + ' - Detaylı Döküm') :
                            selectedPendingTx ? 'Talebi İncele ve Onayla' : 
                            (modalType === 'add' ? 'Fazla Mesai Kazanımı' : 'Mesai İzni Kullanımı')
                        }
                    >
                        {modalType === 'history' && selectedPerson ? (
                            <div className="space-y-6">
                                {(() => {
                                    const normalizeId = (id) => String(id || '').trim().toLowerCase();
                                    const normalizeDateSimple = (d) => {
                                        if (!d) return '';
                                        let s = String(d).trim();
                                        if (s.includes('.')) {
                                            const parts = s.split(' ')[0].split('.');
                                            if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
                                        }
                                        return s.split(/[T ]/)[0];
                                    };

                                    const targetPid = normalizeId(selectedPerson?.id);
                                    const targetName = String(selectedPerson?.fullName || '').toLocaleUpperCase('tr-TR');

                                    const combined = filteredTransactions
                                        .filter(tx => {
                                            const pid = normalizeId(tx.personId);
                                            const dateStr = normalizeDateSimple(tx.date);
                                            const descUpper = String(tx.description || '').toLocaleUpperCase('tr-TR');
                                            const txLoc = String(tx.location || tx.DUTY_LOC || '').toLocaleUpperCase('tr-TR');
                                            const txNote = String(tx.note || '').toLocaleUpperCase('tr-TR');
                                            
                                            if (isOverseas(txLoc) || isOverseas(descUpper) || isOverseas(txNote)) return false;
                                            
                                            const isAnyDuty = descUpper.includes('GÖREV') || descUpper.includes('GOREV');
                                            const txId = String(tx.id || tx.ID || '').toLowerCase();
                                            const isAuto = txId.startsWith('auto-') || txId.includes('sync');
                                            
                                            // Only filter automatic entries by season. Manual sheet entries should always show.
                                            if (isAuto && isAnyDuty) {
                                                if (!isPlannedDutySeason(dateStr)) return false;
                                            }

                                            // Person match
                                            const isPersonMatch = pid === targetPid || 
                                                                (tx.personName && String(tx.personName).toLocaleUpperCase('tr-TR') === targetName);

                                            if (tx.type === TRANSACTION_TYPES.USED && !isAuto) return false;

                                            return isPersonMatch && 
                                                   dateStr.startsWith('2026') &&
                                                   (tx.status === 'APPROVED' || tx.status === 'PENDING' || !tx.status || tx.status === 'MODIFIED');
                                        });

                                    const fmiDeductions = attendanceRecords.filter(r => {
                                        const pid = normalizeId(r.personId);
                                        const status = String(r.status || '').toLocaleUpperCase('tr-TR');
                                        const dateStr = normalizeDateSimple(r.date);
                                        return pid === targetPid && 
                                               dateStr.startsWith('2026') &&
                                               status.includes('FMİ');
                                    }).map(r => ({
                                        id: `fmi-auto-${r.date}`,
                                        date: normalizeDateSimple(r.date),
                                        type: TRANSACTION_TYPES.USED,
                                        hours: 8,
                                        description: 'FMİ İZİNİ (OTOMATİK DÜŞÜM)',
                                        status: 'APPROVED',
                                        isFmi: true
                                    }));

                                    const gorevSyncs = attendanceRecords.filter(r => {
                                        const pid = normalizeId(r.personId);
                                        const status = String(r.status || '').toLocaleUpperCase('tr-TR');
                                        const loc = String(r.location || r.DUTY_LOC || '').toLocaleUpperCase('tr-TR');
                                        const note = String(r.note || '').toLocaleUpperCase('tr-TR');
                                        const dateStr = normalizeDateSimple(r.date);
                                        
                                        const isBakBnu = note.includes('BAK') || note.includes('BNU') || status.includes('BAK') || status.includes('BNU');
                                        const isPlanned = r.isPlanned === true || String(r.isPlanned || '').toLocaleUpperCase('tr-TR').includes('PLANLI');
                                        const isOverseasDuty = isOverseas(loc) || isOverseas(note) || isOverseas(status);

                                        return pid === targetPid && 
                                               dateStr.startsWith('2026') &&
                                               (status === 'GÖREV' || status.includes('GÖREV') || status.includes('GOREV')) &&
                                               isPlanned &&
                                               !isBakBnu &&
                                               !isOverseasDuty &&
                                               isPlannedDutySeason(dateStr);
                                    }).filter(r => {
                                        const dateStr = normalizeDateSimple(r.date);
                                        return !combined.some(tx => {
                                            const d = normalizeDateSimple(tx.date);
                                            const desc = String(tx.description || '').toLocaleUpperCase('tr-TR');
                                            const id = String(tx.id || tx.ID || '').toLowerCase();
                                            // Check for any duty on this day (auto or manual)
                                            return d === dateStr && (id.includes('duty') || desc.includes('GÖREV') || desc.includes('GOREV'));
                                        });
                                    }).map(r => {
                                        const dateStr = normalizeDateSimple(r.date);
                                        const isInSeason = isPlannedDutySeason(dateStr);
                                        const isWk = (() => {
                                            if (!dateStr) return false;
                                            const [y, m, d] = dateStr.split(' ')[0].split('-').map(Number);
                                            const dt = new Date(y, m - 1, d);
                                            return dt.getDay() === 0 || dt.getDay() === 6;
                                        })();
                                        
                                        // Planned duty is 3h on weekdays, 11h on weekends in season
                                        const points = isInSeason ? (isWk ? 11 : 3) : 8; 

                                        return {
                                            id: `gorev-auto-sync-${r.date}`,
                                            date: dateStr,
                                            location: r.location || r.DUTY_LOC || '',
                                            type: TRANSACTION_TYPES.EARNED,
                                            hours: points,
                                            description: isInSeason ? 'PLANLI GÖREV (OTOMATİK)' : 'PLANSIZ GÖREV (OTOMATİK)',
                                            status: 'APPROVED',
                                            isGorevSync: true,
                                            isPlanned: isInSeason,
                                            note: r.note || ''
                                        };
                                    });

                                    const standbySyncs = attendanceRecords.filter(r => {
                                        const pid = normalizeId(r.personId);
                                        const status = String(r.status || '').toLocaleUpperCase('tr-TR');
                                        const note = String(r.note || '').toLocaleUpperCase('tr-TR');
                                        const loc = String(r.location || r.DUTY_LOC || '').toLocaleUpperCase('tr-TR');
                                        const dateStr = normalizeDateSimple(r.date);
                                        
                                        const isExcluded = status.includes('İZİN') || status.includes('IZIN') || status.includes('RAPOR') || status.includes('İSTİRAHAT') || status.includes('HASTANE');

                                        return pid === targetPid && 
                                               dateStr.startsWith('2026') &&
                                               (status.includes('BEKLEME') || note.includes('BEKLEME') || loc.includes('BEKLEME')) &&
                                               !isExcluded &&
                                               isStandbyDate(dateStr);
                                    }).filter(r => {
                                        const dateStr = normalizeDateSimple(r.date);
                                        return !combined.some(tx => {
                                            const d = normalizeDateSimple(tx.date);
                                            const id = String(tx.id || tx.ID || '').toLowerCase();
                                            const desc = String(tx.description || '').toLocaleUpperCase('tr-TR');
                                            // Check for any standby on this day (auto or manual)
                                            return d === dateStr && (id.includes('standby') || desc.includes('BEKLEME'));
                                        });
                                    }).map(r => {
                                        const dateStr = normalizeDateSimple(r.date);
                                        const status = String(r.status || '').toLocaleUpperCase('tr-TR');
                                        const note = String(r.note || '').toLocaleUpperCase('tr-TR');
                                        const descJoint = `${status} ${note}`.toLocaleUpperCase('tr-TR');
                                        const isWeeklyOrPublicHoliday = getDayType(dateStr) === DAY_TYPES.HOLIDAY;
                                        const isHoliday = descJoint.includes('RESMİ BEKLEME') || descJoint.includes('RESMI BEKLEME') || descJoint.includes('TATİL-BEKLEME') || descJoint.includes('TATIL-BEKLEME') || descJoint.includes('RESMİ TATİL BEKLEME') || descJoint.includes('RESMI TATIL BEKLEME') || descJoint.includes('RESMİ TATİL') || descJoint.includes('RESMI TATIL') || isWeeklyOrPublicHoliday;
                                        return {
                                            id: `standby-auto-sync-${r.date}`,
                                            date: dateStr,
                                            type: TRANSACTION_TYPES.EARNED,
                                            hours: isHoliday ? 2 : 1,
                                            description: isHoliday ? "RESMİ TATİL BEKLEME-ANKARA" : "BEKLEME-ANKARA",
                                            status: 'APPROVED',
                                            isStandbySync: true, isHolidayStandby: isHoliday, isStandby: !isHoliday
                                        };
                                    });

                                    const rawItems = [...combined, ...fmiDeductions, ...gorevSyncs, ...standbySyncs];
                                    
                                    // Priority deduplication per day
                                    const seen = new Map();
                                    rawItems.forEach(item => {
                                        const d = String(item.date).split(' ')[0];
                                        const existing = seen.get(d);
                                        
                                        const txId = String(item.id || item.ID || '').toLowerCase();
                                        const isManualOverride = txId.startsWith('manual-override');
                                        const isAuto = txId.startsWith('auto-') || txId.includes('sync') || item.isFmi || item.isGorevSync || item.isStandbySync;
                                        
                                        if (!existing) {
                                            seen.set(d, item);
                                        } else {
                                            const exId = String(existing.id || existing.ID || '').toLowerCase();
                                            const existingIsManual = exId.startsWith('manual-override');
                                            const existingIsAuto = exId.startsWith('auto-') || exId.includes('sync') || existing.isFmi || existing.isGorevSync || existing.isStandbySync;
                                            
                                            if (isManualOverride) {
                                                seen.set(d, item);
                                            } else if (!isAuto && existingIsAuto) {
                                                seen.set(d, item);
                                            }
                                        }
                                    });

                                    const allItems = Array.from(seen.values())
                                        .sort((a, b) => {
                                            const dateB = new Date(b.date);
                                            const dateA = new Date(a.date);
                                            const timeB = isNaN(dateB.getTime()) ? 0 : dateB.getTime();
                                            const timeA = isNaN(dateA.getTime()) ? 0 : dateA.getTime();
                                            if (timeB !== timeA) return timeB - timeA;
                                            return 0;
                                        });

                                    // Use globally calculated stats to ensure detailed breakdown matches the summary table EXACTLY.
                                    const pIdNorm = String(selectedPerson.id || '').trim().toLowerCase();
                                    const targetStats = stats[pIdNorm] || {
                                        earned: 0,
                                        used: 0,
                                        balance: 0,
                                        standby: 0,
                                        holidayStandby: 0,
                                        notesBreakdown: {}
                                    };

                                    const modalEarned = targetStats.earned;
                                    const modalUsed = targetStats.used;
                                    const modalBalance = targetStats.balance;
                                    const modalNormalStandby = targetStats.standby;
                                    const modalHolidayStandby = targetStats.holidayStandby;
                                    const modalNotesBreakdown = targetStats.notesBreakdown || {};

                                    return (
                                        <>
                                            {/* Summary Stats */}
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <div className="bg-blue-500/10 border border-blue-500/20 p-4 rounded-2xl">
                                                    <p className="text-[10px] font-black text-blue-400 uppercase mb-1">Toplam Kazanım</p>
                                                    <p className="text-xl font-black text-white">{modalEarned} SAAT</p>
                                                    <div className="mt-2 space-y-1">
                                                        {Object.entries(modalNotesBreakdown || {}).map(([note, hrs]) => (
                                                            <div key={note} className="flex justify-between items-center text-[9px] font-bold text-blue-300 bg-blue-500/10 px-2 py-0.5 rounded-full border border-blue-500/10" title={note}>
                                                                <span className="truncate max-w-[120px]">{note}</span>
                                                                <span>+{hrs}s</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="bg-purple-500/10 border border-purple-500/20 p-4 rounded-2xl flex flex-col justify-between">
                                                    <div>
                                                        <p className="text-[10px] font-black text-purple-400 uppercase mb-2">Bekleme Puanları</p>
                                                        <p className="text-xl font-black text-white">{modalNormalStandby + modalHolidayStandby} PUAN</p>
                                                    </div>
                                                    <div className="mt-2 pt-2 border-t border-purple-500/10 space-y-1.5 text-[10px] font-bold text-purple-300">
                                                        <div className="flex justify-between items-center bg-purple-950/20 px-2.5 py-1 rounded border border-purple-900/10">
                                                            <span>Normal Bekleme (1P):</span>
                                                            <span className="text-white font-black bg-purple-900/40 px-1.5 py-0.2 rounded">{modalNormalStandby} Gün ({modalNormalStandby} Puan)</span>
                                                        </div>
                                                        <div className="flex justify-between items-center bg-purple-950/20 px-2.5 py-1 rounded border border-purple-900/10">
                                                            <span>Resmi Tatil (2P):</span>
                                                            <span className="text-white font-black bg-fuchsia-900/40 px-1.5 py-0.2 rounded">{Math.round(modalHolidayStandby / 2)} Gün ({modalHolidayStandby} Puan)</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="bg-amber-500/10 border border-amber-500/20 p-4 rounded-2xl">
                                                    <p className="text-[10px] font-black text-amber-500 uppercase mb-1">Kullanılan İzin</p>
                                                    <p className="text-xl font-black text-white">{modalUsed} SAAT</p>
                                                </div>
                                                <div className="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-2xl">
                                                    <p className="text-[10px] font-black text-emerald-400 uppercase mb-1">Kalan Bakiye</p>
                                                    <p className="text-xl font-black text-emerald-300">{modalBalance.toFixed(1)} S</p>
                                                </div>
                                            </div>

                                            {/* Transaction List */}
                                            <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                                                <div className="flex items-center justify-between border-b border-forest-800 pb-2">
                                                    <h4 className="text-xs font-black text-forest-400 uppercase tracking-widest flex items-center gap-2">
                                                        <Icon name="History" size={14} /> İşlem Detayları
                                                    </h4>
                                                    <button 
                                                        onClick={() => exportIndividualExcel(selectedPerson, allItems, { modalEarned, modalNormalStandby, modalHolidayStandby, modalUsed, modalBalance })}
                                                        type="button"
                                                        className="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-2xs sm:text-xs font-bold transition-all flex items-center gap-1.5 shadow-md hover:scale-[1.02] cursor-pointer"
                                                        title="Tasarımı Bozmadan Bu Personelin Detaylı Dökümünü Excel (.xlsx) İndir"
                                                    >
                                                        <Icon name="Download" size={12} />
                                                        <span>Bireysel Excel İndir (.xlsx)</span>
                                                    </button>
                                                </div>
                                                
                                                {allItems.length === 0 ? (
                                                    <div className="text-center py-12 bg-forest-900/30 rounded-3xl border border-dashed border-forest-800">
                                                        <Icon name="Inbox" size={32} className="text-forest-700 mx-auto mb-3" />
                                                        <p className="text-forest-500 font-bold uppercase text-[10px]">2026 yılına ait işlem kaydı bulunmuyor</p>
                                                    </div>
                                                ) : (
                                                    allItems.map(tx => {
                                            const txId = String(tx.id || tx.ID || '').toLowerCase();
                                            const descUpper = String(tx.description || '').toLocaleUpperCase('tr-TR');
                                            const isAuto = txId.startsWith('auto-') || txId.includes('auto-') || txId.includes('sync');
                                            
                                            const dayType = getDayType(tx.date);
                                            const isHolidayDate = dayType === DAY_TYPES.HOLIDAY;
                                            
                                            const hasBeklemeInText = txId.includes('standby') || descUpper.includes('BEKLEME');
                                            const isExplicitHolidayStandby = descUpper.includes('RESMİ BEKLEME') || descUpper.includes('RESMI BEKLEME') || descUpper.includes('TATİL-BEKLEME') || descUpper.includes('TATIL-BEKLEME') || descUpper.includes('RESMİ TATİL BEKLEME') || descUpper.includes('RESMI TATIL BEKLEME') || descUpper.includes('RESMİ TATİL') || descUpper.includes('RESMI TATIL') || txId.includes('hstandby') || txId.includes('holidaystandby');
                                            const isHolidayStandby = hasBeklemeInText && (isHolidayDate || isExplicitHolidayStandby);
                                            const isStandby = hasBeklemeInText && !isHolidayStandby;
                                            const isPlannedDuty = txId.includes('auto_duty') || descUpper.includes('OTOMATİK GÖREV') || descUpper.includes('PLANLI GÖREV');
                                            const isDuty = (txId.includes('duty') || descUpper.includes('GÖREV') || descUpper.includes('GOREV')) && !isStandby && !isHolidayStandby && !isPlannedDuty;
                                            const isFmi = descUpper.includes('FMİ') || descUpper.includes('FMI') || descUpper.includes('F.M.İ') || txId.includes('fmi');
