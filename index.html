                        // Robust Date Parsing for strings like "2026-05-10 00:00"
                        const datePart = String(tx.date || '').split(' ')[0];
                        const [y, mm, dd] = datePart.split('-').map(Number);
                        
                        if (isNaN(y) || isNaN(mm) || isNaN(dd)) return;

                        // Handle hours/days carefully
                        const rawHours = parseFloat(tx.hours || 0);
                        const rawDays = parseFloat(tx.days || 1);
                        
                        let h = rawHours;
                        if (tx.type === TRANSACTION_TYPES.USED && h === 0 && rawDays > 0) h = rawDays * 8;
                        if (tx.type === TRANSACTION_TYPES.EARNED && h === 0 && rawDays > 0) h = rawDays * 8;

                        if (tx.type === TRANSACTION_TYPES.EARNED) {
                            const person = personnel.find(p => cleanPersonnelId(p.id) === pid);
                            const title = (person?.title || '').toLocaleUpperCase('tr-TR');
                            const name = (person?.fullName || '').toLocaleUpperCase('tr-TR');
                            
                            const isTechnical = ['UÇAK TEKNİKERİ', 'UÇAK TEKNİSYENİ'].some(t => title.includes(t)) && !(name.includes('SERKAN KOTAN') || name.includes('SERKAN KÖTEN'));
                            
                            const numDays = parseFloat(tx.days || 1);
                            const hoursPerDay = h / numDays;

                            for (let i = 0; i < numDays; i++) {
                                const cur = new Date(y, mm - 1, dd + i);
                                const curStr = formatDateLocal(cur);
                                const dayKey = `${pid}_${curStr}`;
                                
                                // DEDUPLICATION & TYPE CHECKS
                                let points = hoursPerDay;
                                let skip = false;

                                if (isHolidayStandby) {
                                    if (processedDays.HOLIDAY_STANDBY.has(dayKey)) skip = true;
                                    else {
                                        processedDays.HOLIDAY_STANDBY.add(dayKey);
                                        points = 2.0; // Holiday Standby always 2h
                                    }
                                } else if (isStandby) {
                                    if (processedDays.STANDBY.has(dayKey)) skip = true;
                                    else {
                                        processedDays.STANDBY.add(dayKey);
                                        if (!isStandbyDate(curStr)) skip = true;
                                        else points = 1.0; // Normal standby 1h
                                    }
                                } else if (isAnyDuty) {
                                    const dayType = getDayType(curStr);
                                    const isWk = cur.getDay() === 0 || cur.getDay() === 6;
                                    const isInSeason = isPlannedDutySeason(curStr);
                                    const isThisPlanned = isPlannedDuty || (isAutoDuty && isInSeason);

                                    if (isThisPlanned) {
                                        if (processedDays.PLANNED_DUTY.has(dayKey)) skip = true;
                                        else {
                                            processedDays.PLANNED_DUTY.add(dayKey);
                                            if (processedDays.USED.has(dayKey)) {
                                                points = 0;
                                            } else if (!isAuto) {
                                                points = hoursPerDay;
                                                if (isWk) map[pid].plannedDutyWeekend.hours += points;
                                                else map[pid].plannedDutyWeekday.hours += points;
                                            } else if (isWk) {
                                                points = 11.0;
                                                map[pid].plannedDutyWeekend.days += 1;
                                                map[pid].plannedDutyWeekend.hours += points;
                                            } else {
                                                points = 3.0; 
                                                map[pid].plannedDutyWeekday.days += 1;
                                                map[pid].plannedDutyWeekday.hours += points;
                                            }
                                        }
                                    } else {
                                        // Unplanned (Plansız) - Do NOT dedupe by dayKey, keep all
                                        points = hoursPerDay * getMultiplier(dayType, isTechnical);
                                        const dayStats = map[pid].breakdown[dayType] || { day: 0, night: 0 };
                                        if (String(tx.shift).toUpperCase().includes('GECE')) dayStats.night += hoursPerDay; 
                                        else dayStats.day += hoursPerDay;
                                        map[pid].breakdown[dayType] = dayStats;
                                    }
                                }

                                if (skip) continue;

                                let dayType = getDayType(curStr);
                                map[pid].score += points;

                                // Track notes for detail gains (e.g., Bayram, Muğla etc)
                                if (tx.note) {
                                    const noteKey = String(tx.note).toLocaleUpperCase('tr-TR').trim();
                                    if (noteKey) {
                                        map[pid].notesBreakdown[noteKey] = (map[pid].notesBreakdown[noteKey] || 0) + points;
                                    }
                                }

                                if (isHolidayStandby) map[pid].holidayStandby += points;
                                else if (isStandby) map[pid].standby += points;
                                else if (isAnyDuty) {
                                    // Handled above to differentiate Planned vs Unplanned
                                } else {
                                    const dayStats = map[pid].breakdown[dayType] || { day: 0, night: 0 };
                                    if (String(tx.shift).toUpperCase().includes('GECE')) dayStats.night += points;
                                    else dayStats.day += points;
                                    map[pid].breakdown[dayType] = dayStats;
                                }
                            }
                        } else if (tx.type === TRANSACTION_TYPES.USED) {
                            if (!isAuto) return;
                            const dateStr = String(tx.date || '').split(' ')[0];
                            
                            // SEASON FILTER for FMİ (1 MAY - 31 DEC)
                            if (!isStandbyDate(dateStr)) return;
                            
                            const dKey = `${pid}_${dateStr}`;
                            if (countedUsedDates.has(dKey)) return;
                            countedUsedDates.add(dKey);
                            
                            // For usage, we take the hours precisely as defined (usually 8.0)
                            const valence = parseFloat(tx.hours || (tx.days ? tx.days * 8 : 8));
                            
                            map[pid].used += valence;

                    let diff = (eH + eM/60) - (sH + sM/60);
                    if (diff < 0) diff += 24;

                    const newHours = diff.toFixed(1);
                    const detectedShift = (sH >= 20 || sH < 6) ? 'Gece' : 'Gündüz';

                    if (formData.hours !== newHours || formData.shift !== detectedShift) {

                        if (!dateStr) return null;
                        const parts = dateStr.split('-');

                            return new Date(Date.UTC(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10), 12, 0, 0));
                        }
                        return new Date(dateStr);

                    const end = parseLocalDateUTC(formData.endDate);

                            setFormData(prev => ({ ...prev, endDate: formData.date, days: '1', hours: '8.0' }));
                        } else {
                            const diffTime = Math.abs(end.getTime() - start.getTime());

                                font-size: 13px;
                            }
                            .btn-print {
                                background-color: #10b981;
                                color: white;
                                border: none;
                                padding: 8px 18px;
                                font-size: 13px;
                                font-weight: bold;
                                border-radius: 6px;
                                cursor: pointer;
                                transition: background-color 0.2s;
                            }
                            .btn-print:hover {
                                background-color: #059669;
                            }
                            table {
                                width: 100%;
                                border-collapse: collapse;
                                background-color: #0d2617;
                                border-radius: 8px;
                                overflow: hidden;
                                box-shadow: 0 4px 20px rgba(0,0,0,0.4);
                            }
                            th {
                                text-transform: uppercase;
                                font-size: 9px;
                                font-weight: bold;
                                color: #a4cfa1;
                                background-color: #11341c;
                                padding: 8px 6px;
                                border: 1px solid #1a4225;
                                text-align: center;
                            }
                            td {
                                padding: 9px 6px;
                                font-size: 11.5px;
                                border: 1px solid #1a4225;
                                text-align: center;
                                color: #daedd8;
                            }
                            tr:nth-child(even) td {
                                background-color: #0a2012;
                            }
                            .status-badge {
                                font-size: 9.5px;
                                font-weight: bold;
                                padding: 2px 6px;
                                border-radius: 4px;
                            }
                            .status-mevcut { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
                            .status-gorev { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
                            .status-izin { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }
                            
                            .col-highlight { background: rgba(16, 185, 129, 0.08); font-weight: bold; color: #34d399; }
                            .col-duty { background: rgba(59, 130, 246, 0.05); color: #93c5fd; }
                            .col-duty-hr { background: rgba(59, 130, 246, 0.12); font-weight: bold; color: #60a5fa; }
                            .col-standby { background: rgba(168, 85, 247, 0.05); color: #c084fc; }
                            .col-balance { background: rgba(16, 185, 129, 0.2) !important; font-weight: 900; font-size: 13px; color: #34d399; }
                            
                            @media print {
                                .btn-print { display: none; }
                                body { background: white !important; color: black !important; padding: 15px; }
                                table { background: white !important; color: black !important; box-shadow: none !important; border: 1px solid #999; }
                                th { background: #f0f7f1 !important; color: #11341c !important; border: 1px solid #999 !important; }
                                td { color: black !important; border: 1px solid #aaa !important; background: none !important; }
                                tr:nth-child(even) td { background: #fafafa !important; }
                                .status-badge { color: black !important; background: none !important; border: none !important; font-weight: bold; }
                                .col-highlight, .col-duty, .col-duty-hr, .col-standby, .col-balance { background: none !important; color: black !important; }
                                .col-balance { font-weight: bold !important; font-size: 12px !important; text-decoration: underline; }
                            }
                        </style>
                    </head>
                    <body>
                        <div class="header-container">
                            <div>
                                <h1>Birim Mesai Skorları ve Detaylı Döküm (2026 Yılı)</h1>
                                <p class="subtitle">${reportTitle} - Rapor Tarihi: ${new Date().toLocaleDateString('tr-TR')}</p>
                            </div>
                            <button class="btn-print" onclick="window.print()">Yazdır / PDF Olarak Kaydet</button>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th rowspan="3">No</th>
                                    <th rowspan="3" style="text-align: left;">Personel Bilgisi</th>
                                    <th rowspan="3">Durum</th>
                                    <th colspan="9">Plansız Mesailer (Puanlı)</th>
                                    <th colspan="4">Planlı Görev Mesaisi</th>
                                    <th colspan="5">Bekleme Puanları</th>
                                    <th colspan="3">Mesai ve İzin Özeti</th>
                                </tr>
                                <tr>
                                    <th colspan="3">H.İçi</th>
                                    <th colspan="3">H.Sonu</th>
                                    <th colspan="3">Tatil</th>
                                    <th colspan="2">Hafta İçi</th>
                                    <th colspan="2">Hafta Sonu</th>
                                    <th colspan="2">Normal</th>
                                    <th colspan="2">Tatil</th>
                                    <th rowspan="2">Toplam</th>
                                    <th rowspan="2">Hakediş</th>
                                    <th rowspan="2">Kullanılan</th>
                                    <th rowspan="2">Net Bakiye</th>
                                </tr>
                                <tr>
                                    <th>G</th><th>N</th><th>P</th>
                                    <th>G</th><th>N</th><th>P</th>
                                    <th>G</th><th>N</th><th>P</th>
                                    <th>Gün</th><th>Saat</th>
                                    <th>Gün</th><th>Saat</th>
                                    <th>Gün</th><th>Puan</th>
                                    <th>Gün</th><th>Puan</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHTML}
                            </tbody>
                        </table>
                    </body>
                    </html>
                `);
                printWindow.document.close();
            };

            const approveTransaction = async (id) => {
                const tx = transactions.find(t => t.id === id);
                if (tx && tx.type === TRANSACTION_TYPES.USED) {
                    const pid = tx.personId;
                    const start = new Date(tx.date);
                    const end = new Date(tx.endDate || tx.date);
                    
                    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                        const dateStr = formatDateLocal(d);
                        const status = getCurrentAttendanceStatus(pid, dateStr);
                        const statusUpper = status.toUpperCase();
                        
                        if (statusUpper !== 'MEVCUT' && statusUpper !== '') {
                            alert(`DİKKAT: ${pid} nolu personel için ${dateStr} tarihinde zaten bir görev veya durum (${status}) mevcut! Bu tarihte görev planlaması bulunduğu için izin onaylanamaz.`);
                            return;
                        }
                    }
                }

                try {
                    setLoading(true);
                    await apiCall('approve_overtime', { id });
                    setTransactions(transactions.map(tx => tx.id === id ? { ...tx, status: 'APPROVED' } : tx));
                    showToast("Gözden geçirildi. İzin yönetim bölümüne gönderildi.");
                } catch (err) {
                    alert("Onaylama hatası: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const rejectTransaction = async (id) => {
                try {
                    setLoading(true);
                    await apiCall('delete_overtime', { id });
                    setTransactions(transactions.filter(t => t.id !== id));
                    showToast("Talep silindi.");
                    return true;
                } catch (err) {
                    alert("İşlem hatası: " + err.message);
                    return false;
                } finally {
                    setLoading(false);
                }
            };

            const handleDismissUpdateNotice = () => {
                if (updateNotice) {
                    const seenAlerts = JSON.parse(localStorage.getItem('ogm_seen_alerts') || '[]');
                    
                    if (updateNotice.attendance) {
                        updateNotice.attendance.forEach(att => {
                            const key = `att_${att.personId}_${att.date}_${att.status}_${att.location || ''}`;
                            if (!seenAlerts.includes(key)) {
                                seenAlerts.push(key);
                            }
                        });
                    }
                    if (updateNotice.transactions) {
                        updateNotice.transactions.forEach(tx => {
                            const key = `tx_${tx.id || `${tx.personId}-${tx.date}-${tx.type}`}_${tx.status}`;
                            if (!seenAlerts.includes(key)) {
                                seenAlerts.push(key);
                            }
                        });
                    }
                    
                    if (seenAlerts.length > 1000) {
                        seenAlerts.splice(0, seenAlerts.length - 1000);
                    }
                    localStorage.setItem('ogm_seen_alerts', JSON.stringify(seenAlerts));
                }
                setUpdateNotice(null);
            };

            const hasAttendanceFmi = useCallback((tx) => {
                if (!tx || tx.type !== TRANSACTION_TYPES.USED) return false;
                
                return attendanceRecords.some(r => {
                    const pidRaw = String(r.personId || '').trim().toLowerCase();
                    const txPid = String(tx.personId || '').trim().toLowerCase();
                    const isPersonMatch = pidRaw === txPid || pidRaw.replace(/^p/, '') === txPid.replace(/^p/, '');
                    if (!isPersonMatch) return false;
                    
                    const recordDate = formatDateLocal(r.date);
                    const txDate = formatDateLocal(tx.date);
                    if (recordDate !== txDate) return false;
                    
                    const status = String(r.status || '').toUpperCase('tr-TR').replace(/\./g, '').trim(); 
                    const leave = String(r.leaveType || '').toUpperCase('tr-TR').replace(/\./g, '').trim();
                    const isStatusIzin = status === 'İZİN' || status === 'IZIN';
                    const isLeaveFmi = leave === 'FMİ' || leave === 'FMI' || leave.includes('FMİ') || leave.includes('FMI');
                    const isTransferred = r.isTransferred === true || String(r.isTransferred || '').toLocaleUpperCase('tr-TR').trim() === 'EVET';
                    
                    return isStatusIzin && isLeaveFmi && isTransferred;
                });
            }, [attendanceRecords]);

            useEffect(() => {
                if (loading || !transactions.length || !attendanceRecords.length) return;
                
                const pendingUsedWithAttendance = transactions.filter(tx => {
                    if (tx.status !== 'PENDING' || tx.type !== TRANSACTION_TYPES.USED) return false;
                    return hasAttendanceFmi(tx);
                });
                
                if (pendingUsedWithAttendance.length > 0) {
                    const autoApprove = async () => {
                        try {
                            for (const tx of pendingUsedWithAttendance) {
                                await apiCall('approve_overtime', { id: tx.id }, OVERTIME_SCRIPT_URL);
                            }
                            setTransactions(prev => prev.map(t => {
                                const shouldApprove = pendingUsedWithAttendance.some(x => x.id === t.id);
                                return shouldApprove ? { ...t, status: 'APPROVED' } : t;
                            }));
                            showToast("Sistemde eşleşen izin talepleri otomatik onaylandı.");
                        } catch (e) {
                            console.error("Auto approval failed", e);
                        }
                    };
                    autoApprove();
                }
            }, [transactions, attendanceRecords, loading, hasAttendanceFmi]);

            const handleUpdateHistoryHours = async (tx, newHours, newNote) => {
                try {
                    setLoading(true);
                    const hoursVal = parseFloat(String(newHours).replace(',', '.'));
                    if (isNaN(hoursVal)) throw new Error("Geçerli bir saat giriniz.");
                    
                    const updatedTx = { 
                        ...tx, 
                        hours: hoursVal,
                        note: newNote,
                        personId: tx.personId || selectedPerson?.id,
                        personName: tx.personName || selectedPerson?.fullName,
                        isPlanned: tx.isGorevSync || tx.isPlanned
                    };

                    // Açıklamayı güncelle
                    const baseDesc = tx.description || (tx.isGorevSync ? 'PLANLI GÖREV' : (tx.isStandbySync ? 'BEKLEME' : 'FAZLA MESAİ'));
                    if (newNote !== undefined) {
                        // Eğer zaten parantez içinde bir açıklama varsa onu temizleyip yenisini ekle veya sonuna ekle
                        const cleanDesc = baseDesc.split(' (')[0].split(' [GÜNCELLENDİ]')[0];
                        updatedTx.description = newNote ? `${cleanDesc} (${newNote})` : cleanDesc;
                    }
                    
                    if (tx.isGorevSync || tx.isStandbySync || tx.isFmi || String(tx.id).includes('sync')) {
                        // Yeni bir manuel override kaydı olarak kaydet
                        updatedTx.id = `manual-override-${Date.now()}`;
                        updatedTx.status = 'APPROVED';
                        
                        await apiCall('save_overtime', { transaction: updatedTx });
                        setTransactions([...transactions, updatedTx]);
                    } else {
                        // Mevcut kaydı güncelle
                        await apiCall('approve_overtime', { id: tx.id, transaction: updatedTx });
                        setTransactions(transactions.map(t => t.id === tx.id ? updatedTx : t));
                    }
                    setEditingTxId(null);
                    setEditingNote('');
                    showToast("Güncellendi.");
                } catch (err) {
                    alert("Hata: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // Pending Transactions for current admin
            const pendingApprovals = useMemo(() => {
                if (!adminRole) return [];
                return transactions.filter(tx => {
                    if (tx.status !== 'PENDING') return false;
                    const p = personnel.find(pers => cleanPersonnelId(pers.id) === cleanPersonnelId(tx.personId));
                    if (!p) return false;
                    return isPersonnelInGroup(p, adminRole);
                });
            }, [transactions, adminRole, personnel, isPersonnelInGroup]);

            if (loading) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center bg-forest-950">
                        <div className="w-16 h-16 border-4 border-forest-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-forest-300 font-medium animate-pulse">Veriler Hazırlanıyor...</p>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row items-center justify-between gap-6 mb-12">
                        <div className="flex items-center gap-4">
                            <div className="bg-forest-600 p-3 rounded-2xl shadow-lg ring-4 ring-forest-600/20">
                                <Icon name="Shield" size={32} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tight text-white uppercase">Bakım Şube <span className="text-forest-400 text-lg font-medium ml-2">Yönetim</span></h1>
                                <p className="text-forest-400 text-sm font-medium">Teknik Ekip & Yer Destek Birimleri Takip</p>
                            </div>
                        </div>
                        
                        <nav className="flex flex-wrap justify-center bg-forest-900/50 p-1 rounded-xl border border-forest-700">
                            {[
                                { id: 'home', label: 'Ana Sayfa', icon: 'Home' },
                                { id: 'admin', label: 'Yönetici', icon: 'Lock' }
                            ].map(t => (
                                <button 
                                    key={t.id}
                                    onClick={() => {
                                        if (t.id === 'admin' && !adminRole) {
                                            setShowLogin(true);
                                        } else {
                                            setActiveTab(t.id);
                                        }
                                    }}
                                    className={`px-4 md:px-6 py-2.5 rounded-lg flex items-center gap-2 transition-all font-bold text-sm ${activeTab === t.id ? 'bg-forest-600 text-white shadow-lg' : 'text-forest-400 hover:text-forest-200'}`}
                                >
                                    <Icon name={t.icon} size={18} />
                                    <span className="hidden sm:inline">{t.label}</span>
                                </button>
                            ))}
                            <div className="px-4 py-2.5 rounded-lg flex items-center gap-2 text-rose-400 font-mono text-sm border-r border-forest-800/80 pr-4 mr-1" title="Otomatik Senkronizasyon Kalan Süre">
                                <Icon name="Clock" size={15} className="text-rose-400 animate-pulse" />
                                <span>{Math.floor(countdown / 60)}:{(countdown % 60).toString().padStart(2, '0')}</span>
                            </div>
                            <button 
                                onClick={async () => {
                                    await refreshData();
                                    setCountdown(60);
                                }}
                                disabled={loading}
                                className={`px-4 py-2.5 rounded-lg flex items-center gap-2 transition-all font-bold text-sm text-forest-400 hover:text-white disabled:opacity-50`}
                            >
                                <Icon name="RotateCcw" size={18} className={loading ? 'animate-spin' : ''} />
                                <span className="hidden sm:inline">Güncelle</span>
                            </button>
                        </nav>
                    </header>

                    {activeTab === 'home' && (
                        <div className="space-y-12 animate-fade-in py-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                                <button 
                                    onClick={() => { setSelectedPerson(null); setModalType('add'); setFormData(prev => ({...prev, personId: ''})); }}
                                    className="group relative bg-emerald-600 hover:bg-emerald-500 text-white p-10 rounded-[2.5rem] flex flex-col items-center justify-center gap-6 transition-all shadow-2xl hover:scale-[1.03] active:scale-95 border-b-8 border-emerald-800"
                                >
                                    <div className="bg-white/20 p-5 rounded-3xl group-hover:rotate-12 transition-transform">
                                        <Icon name="PlusCircle" size={48} />
                                    </div>
                                    <span className="font-black text-2xl uppercase tracking-widest text-shadow">FMI GİRİŞİ</span>
                                    <p className="text-emerald-100/60 text-xs font-bold uppercase tracking-tighter">Personel Seçerek Kayıt Başlat</p>
                                </button>

                                <button 
                                    onClick={() => { setSelectedPerson(null); setModalType('use'); setFormData(prev => ({...prev, personId: ''})); }}
                                    className="group relative bg-amber-600 hover:bg-amber-500 text-white p-10 rounded-[2.5rem] flex flex-col items-center justify-center gap-6 transition-all shadow-2xl hover:scale-[1.03] active:scale-95 border-b-8 border-amber-800"
                                >
                                    <div className="bg-white/20 p-5 rounded-3xl group-hover:-rotate-12 transition-transform">
                                        <Icon name="MinusCircle" size={48} />
                                    </div>
                                    <span className="font-black text-2xl uppercase tracking-widest text-shadow">İZİN KAYDI</span>
                                    <p className="text-amber-100/60 text-xs font-bold uppercase tracking-tighter">Kazanılan Mesaiyi İzin Olarak Kaydet</p>
                                </button>
                            </div>
                        </div>
                    )}


                    {activeTab === 'attendance' && (
                        <div className="animate-fade-in space-y-6">
                            <Card title="Günlük Yoklama" icon="CalendarCheck">
                                <div className="flex flex-col md:flex-row items-center gap-4 mb-8">
                                    <div className="flex-1">
                                        <label className="block text-xs font-black text-forest-400 uppercase mb-2 ml-1">Tarih Seçimi</label>
                                        <input 
                                            type="date"
                                            value={selectedDate}
                                            onChange={(e) => setSelectedDate(e.target.value)}
                                            className="w-full md:w-64 bg-forest-950 border border-forest-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-forest-500 outline-none transition-all"
                                        />
                                    </div>
                                    <div className="flex gap-2 pt-6">
                                        <span className="px-4 py-2 bg-forest-900 rounded-lg text-xs font-bold text-forest-400 border border-forest-800">
                                            Toplam: {displayPersonnel.length} Personel
                                        </span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 gap-3">
                                    {displayPersonnel.map(p => {
                                        const record = getAttendanceRecord(p.id, selectedDate);
                                        const status = record.status;
                                        
                                        const setStatus = async (newStatus, location = '', isPlanned = true) => {
                                            if (status === newStatus && (record?.location || '') === location && (record?.isPlanned ?? true) === isPlanned) return;

                                            const otherRecords = attendanceRecords.filter(r => !(r.personId === p.id && r.date === selectedDate));
                                            const newRecord = { 
                                                personId: p.id || "", 
                                                date: selectedDate || "", 
                                                status: newStatus || "", 
                                                location: location || "", 
                                                isPlanned: isPlanned !== undefined ? isPlanned : true,
                                                leaveType: "",
                                                note: ""
                                            };
                                            const updatedRecords = [...otherRecords, newRecord];
                                            setAttendanceRecords(updatedRecords);
                                            localStorage.setItem('ogm_attendance', JSON.stringify(updatedRecords));

                                            try {
                                                await apiCall('save_attendance', { record: newRecord, records: [newRecord] }, PERSONNEL_SCRIPT_URL);
                                                showToast(`${p.fullName} için yoklama güncellendi.`);
                                                // Reload data to fetch the updated auto-sync transactions
                                                await loadData();
                                            } catch (e) {
                                                console.error("Attendance save failed", e);
                                                showToast("Yoklama sunucuya kaydedilemedi!", "error");
                                            }
                                        };

                                        return (
                                            <div key={p.id} className="flex flex-col p-4 bg-forest-950/30 rounded-xl border border-forest-800 hover:border-forest-600 transition-colors gap-4">
                                                <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                                                    <div 
                                                        className="flex items-center gap-4 w-full md:w-auto cursor-help group/apname"
                                                        onMouseEnter={(e) => {
                                                            if (p.photoUrl) {
                                                                setHoverPhoto({ url: p.photoUrl, personId: p.id });
                                                                setMousePos({ x: e.clientX, y: e.clientY });
                                                            }
                                                        }}
                                                        onMouseMove={(e) => {
                                                            setMousePos({ x: e.clientX, y: e.clientY });
                                                        }}
                                                        onMouseLeave={() => setHoverPhoto(null)}
                                                    >
                                                        <PersonnelPhoto photoUrl={p.photoUrl} personId={p.id} fullName={p.fullName} />
                                                        <div>
                                                            <p className="font-bold text-white text-sm group-hover/apname:text-forest-300 transition-colors uppercase">{p.fullName}</p>
                                                            <p className="text-[10px] text-forest-500 font-bold uppercase tracking-wider">{p.title}</p>
                                                            {(status?.toUpperCase() === 'GÖREVLİ' || status?.toUpperCase() === 'GÖREV') && record?.location && (
                                                                <p className="text-[10px] text-blue-400 font-black mt-1 uppercase flex items-center gap-1">
                                                                    <Icon name="MapPin" size={10} /> {record.location}
                                                                </p>
                                                            )}
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-wrap gap-2 w-full md:w-auto justify-center">
                                                        {[
                                                            { id: 'Mevcut', color: 'bg-green-600/20 text-green-400 border-green-500/30' },
                                                            { id: 'Görev', color: 'bg-blue-600/20 text-blue-400 border-blue-500/30' },
                                                            { id: 'Kurs', color: 'bg-cyan-600/20 text-cyan-400 border-cyan-500/30' },
                                                            { id: 'İzin', color: 'bg-amber-600/20 text-amber-400 border-amber-500/30' },
                                                            { id: 'Rapor', color: 'bg-rose-600/20 text-rose-400 border-rose-500/30' },
                                                            { id: 'Hastane', color: 'bg-pink-600/20 text-pink-400 border-pink-500/30' },
                                                            { id: 'İdari İzin', color: 'bg-emerald-600/20 text-emerald-400 border-emerald-500/30' },
                                                            { id: 'Diğer', color: 'bg-slate-600/20 text-slate-400 border-slate-500/30' },
                                                            { id: 'Yok', color: 'bg-gray-600/20 text-gray-400 border-gray-500/30' },
                                                            { id: 'Bekleme', color: 'bg-purple-600/20 text-purple-400 border-purple-500/30' }
                                                        ].map(s => (
                                                            <button
                                                                key={s.id}
                                                                onClick={() => setStatus(s.id, record?.location)}
                                                                className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all px-3 ${status === s.id ? s.color.replace('/20', '/80').replace('text-', 'text-white ') + ' ring-2 ring-white/20' : 'bg-forest-900 text-forest-500 border border-forest-800 hover:border-forest-600'}`}
                                                            >
                                                                {s.id}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                {(status?.toUpperCase() === 'GÖREVLİ' || status?.toUpperCase() === 'GÖREV' || status === 'Diğer') && (
                                                    <div className="mt-3 pl-14 animate-fade-in">
                                                        <div className="flex flex-col md:flex-row gap-3 p-3 bg-blue-500/5 rounded-xl border border-blue-500/10 w-full">
                                                            {/* Planlı / Plansız Radios (Only for Görev) */}

                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-forest-800/50">
                                                {displayPersonnel
                                                    .filter(p => isPersonnelInGroup(p, adminRole))
                                                    .map((p, index) => {
                                                        const pIdNorm = String(p.id || '').trim().toLowerCase();
                                                        const s = stats[pIdNorm] || { earned: 0, used: 0, balance: 0, score: 0, standby: 0, breakdown: {} };

                                                        const title = (p.title || '').toLocaleUpperCase('tr-TR');

                                                        const isTech = ['UÇAK TEKNİKERİ', 'UÇAK TEKNİSYENİ'].some(t => title.includes(t)) && !isSerkan;
                                                        
                                                        const wkdayData = b[DAY_TYPES.WEEKDAY] || { day: 0, night: 0 };
                                                        const wkendData = b[DAY_TYPES.WEEKEND] || { day: 0, night: 0 };
                                                        const holidData = b[DAY_TYPES.HOLIDAY] || { day: 0, night: 0 };
                                                        
                                                        const pWkday = (wkdayData.day + wkdayData.night) * getMultiplier(DAY_TYPES.WEEKDAY, isTech);
                                                        const pWkend = (wkendData.day + wkendData.night) * getMultiplier(DAY_TYPES.WEEKEND, isTech);
                                                        const pHolid = (holidData.day + holidData.night) * getMultiplier(DAY_TYPES.HOLIDAY, isTech);
                                                        
                                                        return (
                                                            <tr 
                                                                key={p.id} 
                                                                className="hover:bg-forest-800/30 cursor-pointer transition-colors active:bg-forest-700/50"
                                                                onClick={() => {
                                                                    setSelectedPerson(p);
                                                                    setModalType('history');

                                                                    <div className="flex items-center gap-3">
                                                                        <PersonnelPhoto photoUrl={p.photoUrl} personId={p.id} fullName={p.fullName} size="w-8 h-8" />
                                                                        <div className="flex flex-col">
                                                                            <span className="uppercase text-[11px] whitespace-nowrap">{p.fullName}</span>
                                                                            <span className="text-[9px] text-forest-500 uppercase">{p.title}</span>
