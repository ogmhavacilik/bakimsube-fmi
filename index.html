    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              forest: {
                50: '#f2fcf5',
                100: '#e1f8e8',
                200: '#c3eed0',
                300: '#94e0ad',

              }

            animation: {
                'fade-in': 'fadeIn 0.3s ease-in-out',
                'slide-up': 'slideUp 0.4s ease-out',
                'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'shake': 'shake 0.2s ease-in-out 0s 2',
            },
            keyframes: {
                fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                slideUp: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                shake: {
                    '0%, 100%': { transform: 'translateX(0)' },
                    '25%': { transform: 'translateX(-4px)' },
                    '75%': { transform: 'translateX(4px)' }
                }
            }
          }
        }
      }
    </script>
    
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0b2918; }
      ::-webkit-scrollbar-thumb { background: #1e5b35; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #258f4d; }
      .glass-card { background: rgba(25, 75, 46, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(148, 224, 173, 0.1); }
      .personnel-photo-square { width: 100%; height: 100%; object-fit: cover; }
    </style>

    <!-- Babel Standalone for JSX & ESM transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ExcelJS and FileSaver CDN for Styled Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- Import Maps for Modules -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react,react-dom"
  }
}
</script>
</head>
<body class="bg-forest-950 min-h-screen text-forest-50 selection:bg-forest-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as LucideIcons from 'lucide-react';

        // --- ICONS (Lucide Wrapper) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            if (!name) return null;
            try {
                const LucideIcon = LucideIcons[name] || (name.length > 0 ? LucideIcons[name.charAt(0).toUpperCase() + name.slice(1)] : null);
                if (!LucideIcon) return null;
                return <LucideIcon size={size} className={className} />;
            } catch (e) {
                return null;
            }
        };

        // --- CONSTANTS ---
        const AIRCRAFT_MODELS = {
            TEKNIK_EKIP: 'TEKNİK EKİP',
            YER_DESTEK: 'YER DESTEK'
        };

        const TRANSACTION_TYPES = {
            EARNED: 'EARNED', // Mesai Kazanıldı
            USED: 'USED'      // Mesai Kullanıldı
        };

        const OVERTIME_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNJ7pkBjs5rWGEBwNTg1AAMqLqRJ7mY9EyWMglPiQV01mxPVp1bZvJoIexD8XRxQKoaQ/exec";
        const PERSONNEL_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKwM9Odc7tz8kqrBa00kikQbdVTstgJmrRzOPNDnsR6xL9-9vXWUlvOdVN_8HxJBKEqw/exec";
        const SYSTEM_ID = "0005536572913";

        // --- HOLIDAY & CALCULATION CONFIG ---
        const TURKISH_HOLIDAYS = [
            '01-01', // Yılbaşı
            '04-23', // Ulusal Egemenlik ve Çocuk Bayramı
            '05-01', // Emek ve Dayanışma Günü
            '05-19', // Atatürk'ü Anma, Gençlik ve Spor Bayramı
            '07-15', // Demokrasi ve Milli Birlik Günü
            '08-30', // Zafer Bayramı
            '10-29', // Cumhuriyet Bayramı
        ];

        // 2024-2026 Movable Holidays (Eid)
        const MOVABLE_HOLIDAYS = [
            '2024-04-10', '2024-04-11', '2024-04-12', // Ramazan 2024
            '2024-06-16', '2024-06-17', '2024-06-18', '2024-06-19', // Kurban 2024
            '2025-03-30', '2025-03-31', '2025-04-01', // Ramazan 2025
            '2025-06-06', '2025-06-07', '2025-06-08', '2025-06-09', // Kurban 2025
            '2026-03-20', '2026-03-21', '2026-03-22', // Ramazan 2026
            '2026-05-23', '2026-05-24', '2026-05-25', '2026-05-26', '2026-05-27', '2026-05-28', '2026-05-29', '2026-05-30', '2026-05-31', // Kurban 2026 (9 Gün)
        ];

        const DAY_TYPES = {
            WEEKDAY: 'Hafta İçi',
            WEEKEND: 'Hafta Sonu',
            HOLIDAY: 'Resmi Tatil'
        };

        const formatDateLocal = (date) => {
            if (!date) return "";
            let s = String(date).trim();
            if (s.includes('.')) {
                const parts = s.split(' ')[0].split('.');
                if (parts.length === 3) {
                    s = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                }
            }
            s = s.split(/[T ]/)[0];
            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
            const d = new Date(date);
            if (isNaN(d.getTime())) return s;
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        };

        const cleanPersonnelId = (id) => {
            return String(id || '').trim().toLowerCase();
        };

        const isStandbyDate = (dateStr) => {
            if (!dateStr) return false;
            const normalized = formatDateLocal(dateStr);
            if (!normalized.startsWith('2026')) return false;
            const parts = normalized.split('-');
            if (parts.length < 3) return false;
            const month = parseInt(parts[1]);
            const day = parseInt(parts[2]);
            // 1 Mayıs (5) - 31 Aralık (12) arası
            if (month > 5) return true; // covers 6-12
            if (month === 5 && day >= 1) return true;
            return false;
        };

        const isPlannedDutySeason = (dateStr) => {
            return isStandbyDate(dateStr);
        };

        const TURKISH_CITIES = ['ADANA', 'ADIYAMAN', 'AFYONKARAHISAR', 'AFYON', 'AGRI', 'AKSARAY', 'AMASYA', 'ANKARA', 'ANTALYA', 'ARDAHAN', 'ARTVIN', 'AYDIN', 'BALIKESIR', 'BARTIN', 'BATMAN', 'BAYBURT', 'BILECIK', 'BINGOL', 'BITLIS', 'BOLU', 'BURDUR', 'BURSA', 'CANAKKALE', 'CANKIRI', 'CORUM', 'DENIZLI', 'DIYARBAKIR', 'DUZCE', 'EDIRNE', 'ELAZIG', 'ERZINCAN', 'ERZURUM', 'ESKISEHIR', 'GAZIANTEP', 'GIRESUN', 'GUMUSHANE', 'HAKKARI', 'HATAY', 'IGDIR', 'ISPARTA', 'ISTANBUL', 'IZMIR', 'KAHRAMANMARAS', 'KARABUK', 'KARAMAN', 'KARS', 'KASTAMONU', 'KAYSERI', 'KILIS', 'KIRIKKALE', 'KIRKLARELI', 'KIRSEHIR', 'KOCAELI', 'KONYA', 'KUTAHYA', 'MALATYA', 'MANISA', 'MARDIN', 'MERSIN', 'MUGLA', 'MUS', 'NEVSEHIR', 'NIGDE', 'ORDU', 'OSMANIYE', 'RIZE', 'SAKARYA', 'SAMSUN', 'SANLIURFA', 'SIIRT', 'SINOP', 'SIVAS', 'SIRNAK', 'TEKIRDAG', 'TOKAT', 'TRABZON', 'TUNCELI', 'USAK', 'VAN', 'YALOVA', 'YOZGAT', 'ZONGULDAK'];

        const isOverseas = (loc) => {
            if (!loc) return false;
            const l = String(loc).toLocaleUpperCase('tr-TR')
                        .replace(/İ/g, 'I')
                        .replace(/Ğ/g, 'G')
                        .replace(/Ü/g, 'U')
                        .replace(/Ş/g, 'S')
                        .replace(/Ö/g, 'O')
                        .replace(/Ç/g, 'C')
                        .trim();
            if (l.includes('YURT DISI') || l.includes('YURTDISI') || l.includes('OVERSEAS')) return true;
            
            const overseasCountries = [
                // Europe
                'ALMANYA', 'GERMANY', 'FRANSA', 'FRANCE', 'INGILTERE', 'ENGLAND', 'ITALYA', 'ITALY', 
                'ISPANYA', 'SPAIN', 'UKRES', 'BELCIKA', 'BELGIUM', 'HOLLANDA', 'NETHERLANDS', 'AVUSTURYA', 
                'AUSTRIA', 'AVUSTURALYA', 'AUSTRALIA', 'KANADA', 'CANADA', 'BREZILYA', 'BRAZIL', 
                'CIN', 'CHINA', 'JAPONYA', 'JAPAN', 'KORE', 'KOREA', 'ARABISTAN', 'ARABIA', 
                'IRAK', 'IRAQ', 'SURIYE', 'SYRIA', 'IRAN', 'SUUDI ARABISTAN', 'KATAR', 'QATAR', 'YUNANISTAN', 'GREECE', 
                'BULGARISTAN', 'BULGARIA', 'ROMANYA', 'ROMANIA', 'POLONYA', 'POLAND', 'ISVICRE', 
                'SWITZERLAND', 'ISVEC', 'SWEDEN', 'DANIMARKA', 'DENMARK', 'NORVEC', 'NORWAY', 
                'FINLANDIYA', 'FINLAND', 'LETONYA', 'LATVIA', 'ESTONYA', 'ESTONIA', 'LITVANYA', 'LITHUANIA',
                'CEKYA', 'CZECH', 'MACARISTAN', 'HUNGARY', 'PORTEKIZ', 'PORTUGAL', 'IZLANDA', 'ICELAND',
                'IRLANDA', 'IRELAND', 'MALTA', 'SIRBISTAN', 'SERBIA', 'HIRVATISTAN', 'CROATIA',
                'UKRAYNA', 'UKRAINE', 'SLOVENYA', 'SLOVENIA', 'SLOVAKYA', 'SLOVAKIA', 'CEZAYIR', 'ALGERIA',
                'MONAKO', 'MONACO', 'ANDORRA', 'SAN MARINO', 'VATIKAN', 'VATICAN', 'ARNAVUTLUK', 'ALBANIA',
                'MAKEDONYA', 'MACEDONIA', 'BOSNA', 'BOSNIA', 'HERSEK', 'HERZEGOVINA', 'KARADAG', 'MONTENEGRO',
                'KOSOVA', 'KOSOVO', 'MOLDOVA', 'BELARUS', 'GURCISTAN', 'GEORGIA', 'ERMENISTAN', 'ARMENIA',
                'AZERBAYCAN', 'AZERBAIJAN', 'KIBRIS', 'CYPRUS',
                
                // Americas
                'ABD', 'USA', 'MEKSIKA', 'MEXICO', 'KOLOMBIYA', 'COLOMBIA', 'ARJANTIN', 'ARGENTINA',
                'SILI', 'CHILE', 'PERU', 'EKVADOR', 'ECUADOR', 'VENEZUELA', 'BOLIVYA', 'BOLIVIA',
                'PARAGUAY', 'URUGUAY', 'GUATEMALA', 'KOSTA RIKA', 'COSTA RICA', 'PANAMA', 'KUBA', 'CUBA',
                'JAMAIKA', 'JAMAICA', 'DOMINIK', 'DOMINICAN', 'BAHAMALAR', 'BAHAMAS',
                
                // Asia & Middle East
                'MALEZYA', 'MALAYSIA', 'ENDONEZYA', 'INDONESIA', 'FILIPINLER', 'PHILIPPINES',
                'SINGAPUR', 'SINGAPORE', 'TAYLAND', 'THAILAND', 'VIETNAM', 'KAMBOCYA', 'CAMBODIA',
                'LAOS', 'MYANMAR', 'BURMA', 'HINDISTAN', 'INDIA', 'PAKISTAN', 'AFGANISTAN', 'AFGHANISTAN',
                'BANGLADES', 'BANGLADESH', 'NEPAL', 'SRI LANKA', 'MALDIVLER', 'MALDIVES', 'KAZAKISTAN', 'KAZAKHSTAN',
                'OZBEKISTAN', 'UZBEKISTAN', 'TURKMENISTAN', 'KIRGIZISTAN', 'KYRGYZSTAN', 'TACIKISTAN', 'TAJIKISTAN',
                'MOGOLISTAN', 'MONGOLIA', 'TAYVAN', 'TAIWAN', 'HONG KONG', 'MAKAU', 'MACAO', 'YEMEN', 'UMMAN', 'OMAN',
                'BIRLESIK ARAP EMIRLIKLERI', 'BAE', 'UAE', 'DUBAI', 'ABU DABI', 'KUVEYT', 'KUWAIT', 'BAHREYN', 'BAHRAIN',
                'LUBNAN', 'LEBANON', 'URDUN', 'JORDAN', 'ISRAIL', 'ISRAEL', 'FILISTIN', 'PALESTINE',
                
                // Africa
                'MISIR', 'EGYPT', 'GUNEY AFRIKA', 'SOUTH AFRICA', 'TUNUS', 'TUNISIA', 'FAS', 'MOROCCO',
                'NIGER', 'NIGERIA', 'KENYA', 'ETIYOPYA', 'ETHIOPIA', 'TANZANYA', 'TANZANIA', 'UGANDA',
                'SENEGAL', 'GANA', 'GHANA', 'ANGOLA', 'SUDAN', 'LIBYA', 'MADAGASKAR', 'MADAGASCAR',
                'CEZAYIR', 'ALGERIA', 'KONG', 'CONGO', 'MOGADISU', 'SOMALI',
                
                // Oceania
                'YENI ZELANDA', 'NEW ZEALAND'
            ];
            return overseasCountries.some(country => l.includes(country));
        };

        const getDayType = (dateStr) => {
            if (!dateStr) return DAY_TYPES.WEEKDAY;
            const normalized = formatDateLocal(dateStr);
            const [y, m, d] = normalized.split('-').map(Number);
            if (isNaN(y) || isNaN(m) || isNaN(d)) return DAY_TYPES.WEEKDAY;
            const date = new Date(y, m - 1, d);
            const monthDay = `${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (TURKISH_HOLIDAYS.includes(monthDay) || MOVABLE_HOLIDAYS.includes(normalized)) {
                return DAY_TYPES.HOLIDAY;
            }
            const dayNum = date.getDay();
            if (dayNum === 0 || dayNum === 6) return DAY_TYPES.WEEKEND;
            return DAY_TYPES.WEEKDAY;
        };

        const getMultiplier = (dayType, isTechnical) => {
            if (!isTechnical) return 1.0;
            if (dayType === DAY_TYPES.HOLIDAY) return 2.0;
            if (dayType === DAY_TYPES.WEEKEND) return 1.5;
            return 1.0;
        };

        // --- HELPER FUNCTIONS ---
        const apiCall = async (action, payload = {}, targetUrl = OVERTIME_SCRIPT_URL) => {
            const urlsToTry = [targetUrl];
            const alternateUrl = targetUrl === OVERTIME_SCRIPT_URL ? PERSONNEL_SCRIPT_URL : OVERTIME_SCRIPT_URL;
            if (alternateUrl && alternateUrl !== targetUrl) {
                urlsToTry.push(alternateUrl);
            }

            let lastError = null;
            for (const url of urlsToTry) {
                try {
                    let response;
                    let useDirect = window.location.hostname.includes('netlify') || 
                                    window.location.hostname.includes('github.io') || 
                                    window.location.hostname.includes('vercel.app') || 
                                    window.location.hostname.includes('firebaseapp.com');

                    if (!useDirect) {
                        try {
                            response = await fetch('/api/proxy', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    targetUrl: url,
                                    action,
                                    ...payload,
                                    user: localStorage.getItem('ogm_admin_role') || 'Ziyaretçi'
                                })
                            });

                            if (response.status === 404) {
                                console.warn("Proxy endpoint not found (404). Falling back to direct Apps Script call.");
                                useDirect = true;
                            }
                        } catch (proxyErr) {
                            console.warn("Proxy call failed, falling back to direct Apps Script call:", proxyErr);
                            useDirect = true;
                        }
                    }

                    if (useDirect) {
                        // Direct POST request to Google Apps Script. 
                        // Using 'text/plain;charset=utf-8' ensures it remains a 'simple request'
                        // and bypasses CORS preflight (OPTIONS) restrictions standard browsers enforce.
                        response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'text/plain;charset=utf-8'
                            },
                            body: JSON.stringify({
                                action,
                                ...payload,
                                user: localStorage.getItem('ogm_admin_role') || 'Ziyaretçi'
                            })
                        });
                    }

                    if (!response || !response.ok) {
                        const errJson = await response.json().catch(() => null);
                        const errMsg = errJson && errJson.error ? errJson.error : `Ağ hatası (${response ? response.status : 'Bağlantı Yok'})`;
                        throw new Error(errMsg);
                    }
                    
                    const json = await response.json();
                    if (!json.success) throw new Error(json.error || 'API Hatası');
                    return json.data;
                } catch (error) {
                    console.warn(`API call failed on ${url} for action "${action}". Trying next if available. Error:`, error);
                    lastError = error;
                }
            }
            console.error("All URLs failed for API action " + action + ":", lastError);
            throw lastError || new Error("API Hatası");
        };

        const copyYoklamaFormat = (tx) => {
            const rows = [];
            const startStr = tx.date || (tx.startTime && tx.startTime.split(' ')[0]);
            if (!startStr) {
                alert("Tarih bilgisi bulunamadı.");
                return;
            }
            const start = new Date(startStr + 'T00:00:00');
            const daysCount = tx.type === TRANSACTION_TYPES.USED ? (parseInt(tx.days) || 1) : 1;
            
            for (let i = 0; i < daysCount; i++) {
                const current = new Date(start);
                current.setDate(start.getDate() + i);
                
                const dateStr = formatDateLocal(current);
                const month = current.getMonth() + 1;
                const year = current.getFullYear();
                
                const typeCode = tx.type === TRANSACTION_TYPES.USED ? '4' : '1';
                const statusStr = tx.type === TRANSACTION_TYPES.USED ? 'İzinli' : 'Mesai';
                const typeStr = 'FMİ';
                
                // Format: ID, DATE, PERSON_ID, STATUS, DUTY_LOC, DUTY_TYPE, LEAVE_TYI, NOTE, MONTH, YEAR
                const rowId = SYSTEM_ID;
                const row = `${rowId}\t${dateStr}\t${tx.personId}\t${statusStr}\t\t\t${typeStr}\t\t${month}\t${year}`;
                rows.push(row);
            }
            
            const finalContent = rows.join('\n');
            navigator.clipboard.writeText(finalContent).then(() => {
                alert(`${rows.length} satır Yoklama formatında panoya kopyalandı.`);
            }).catch(err => {
                console.error("Kopyalama hatası:", err);
                alert("Kopyalanamadı.");
            });
        };

        const fixDriveUrl = (url) => {
            if (!url) return '';
            // Match any 25+ char alphanumeric string (typical for Google Drive IDs)
            const driveMatch = url.match(/[-\w]{25,}/);
            if ((url.includes('drive.google.com') || url.includes('google.com')) && driveMatch) {
                // Use lh3.googleusercontent.com/d/ID which is a reliable direct image link
                return `https://lh3.googleusercontent.com/d/${driveMatch[0]}`;
            }
            return url;
        };

        const PersonnelPhoto = ({ photoUrl, personId, fullName, size = "w-10 h-10" }) => {
            return (
                <div className={`${size} rounded-lg bg-forest-900 border border-forest-700 flex items-center justify-center font-bold text-forest-300 overflow-hidden shadow-inner flex-shrink-0`}>
                    <SafeImage src={photoUrl} personId={personId} fullName={fullName} className="personnel-photo-square" />
                </div>
            );
        };

        const SafeImage = ({ src, personId, fullName, className, style }) => {
            const [error, setError] = React.useState(false);
            const [loading, setLoading] = React.useState(true);
            const url = React.useMemo(() => fixDriveUrl(src), [src]);

            if (!url || error) {
                return (
                    <div className={`flex items-center justify-center bg-forest-900 ${className}`}>
                        {fullName?.charAt(0) || <Icon name="User" size={16} className="text-forest-700" />}
                    </div>
                );
            }

            return (
                <div className={`relative ${className}`}>
                    {loading && (
                        <div className="absolute inset-0 flex items-center justify-center bg-forest-900/50">
                            <div className="w-4 h-4 border-2 border-forest-500 border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    )}
                    <img 
                        src={url} 
                        className={`${className} ${loading ? 'opacity-0' : 'opacity-100'}`} 
                        style={style} 
                        referrerPolicy="no-referrer" 
                        onLoad={() => setLoading(false)}
                        onError={() => {
                            setError(true);
                            setLoading(false);
                        }} 
                    />
                </div>
            );
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}-${month}-${year}`;
        };

        // --- COMPONENTS ---
        const Card = ({ children, title, className = "", icon, actions }) => (
            <div className={`glass-card rounded-xl overflow-hidden shadow-2xl animate-fade-in ${className}`}>
                {title && (
                    <div className="bg-forest-900/50 px-6 py-4 border-b border-forest-700 flex items-center justify-between gap-3 flex-wrap">
                        <div className="flex items-center gap-3">
                            {icon && <Icon name={icon} className="text-forest-400" />}
                            <h3 className="font-bold text-lg tracking-tight">{title}</h3>
                        </div>
                        {actions && <div className="flex items-center gap-2">{actions}</div>}
                    </div>
                )}
                <div className="p-6">{children}</div>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, sizeCls = 'max-w-md', children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
                    <div className={`bg-forest-900 border border-forest-700 w-full ${sizeCls} rounded-2xl shadow-2xl animate-slide-up`}>
                        <div className="flex items-center justify-between px-6 py-4 border-b border-forest-700">
                            <h3 className="font-bold text-xl">{title}</h3>
                            <button onClick={onClose} className="text-forest-400 hover:text-white transition-colors">
                                <Icon name="X" size={24} />
                            </button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [personnel, setPersonnel] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('home'); // 'home', 'attendance', 'history', 'admin'
            const [countdown, setCountdown] = useState(60); // 1 minute in seconds
            const [updateNotice, setUpdateNotice] = useState(null); // Notice modal details
            const isFirstLoad = React.useRef(true);
            const [selectedPerson, setSelectedPerson] = useState(null);
            const [hoverPhoto, setHoverPhoto] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [modalType, setModalType] = useState(null); // 'add' or 'use'
            
            // Admin State
            const [adminRole, setAdminRole] = useState(null); // 'ogm1' or 'ogm2'
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [showLogin, setShowLogin] = useState(false);

            // Search State for Modal
            const [searchTerm, setSearchTerm] = useState('');
            const [historySearch, setHistorySearch] = useState('');

            // Attendance State (Simplified)
            const [attendanceRecords, setAttendanceRecords] = useState([]);
            const [selectedDate, setSelectedDate] = useState(formatDateLocal(new Date()));
            
            // Overtime Form State
            const [formData, setFormData] = useState({
                date: '',
                startTime: '',
                endTime: '',
                dayType: '',
                hours: '',
                days: '1',
                endDate: '',
                description: '',
                shift: 'Gündüz',
                personId: ''
            });

            const isPersonnelInGroup = useCallback((p, role) => {
                if (!p) return false;
                const title = (p.title || '').trim().toLocaleUpperCase('tr-TR');
                const name = (p.fullName || '').toLocaleUpperCase('tr-TR');
                const isSerkan = name.includes('SERKAN KOTAN') || name.includes('SERKAN KÖTEN');
                const isUcakTech = title === 'UÇAK TEKNİKERİ' || title === 'UÇAK TEKNİSYENİ';

                if (role === 'ogm1') {
                    return isUcakTech && !isSerkan;
                } else if (role === 'ogm2') {
                    return !isUcakTech || isSerkan;
                }
                return true;
            }, []);

            // Admin Examine State
            const [selectedPendingTx, setSelectedPendingTx] = useState(null);

            // Validation State
            const [validationErrors, setValidationErrors] = useState([]);
            const [editingTxId, setEditingTxId] = useState(null);
            const [editingHours, setEditingHours] = useState('');
            const [editingNote, setEditingNote] = useState('');

            // UI Feedbacks
            const [toast, setToast] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const showConfirm = (message, onConfirm) => {
                setConfirmDialog({ message, onConfirm });
            };

            const getIstanbulToday = () => {
                try {
                    const date = new Date();
                    const istanbulTime = new Date(date.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
                    const year = istanbulTime.getFullYear();
                    const month = String(istanbulTime.getMonth() + 1).padStart(2, '0');
                    const day = String(istanbulTime.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                } catch (e) {
                    return formatDateLocal(new Date());
                }
            };

            const getAttendanceRecord = (personId, date) => {
                if (!personId || !date) return { status: 'Mevcut', location: '' };
                const pidNorm = cleanPersonnelId(personId);
                const d = String(date).trim().split('T')[0];
                
                // Find all matches for this person on this date
                const matches = attendanceRecords.filter(r => {
                    const rIdNorm = cleanPersonnelId(r.personId);
                    const rDate = String(r.date || '').trim().split(/[T ]/)[0];
                    return rIdNorm === pidNorm && rDate === d;
                });

                if (matches.length === 0) return { status: 'Mevcut', location: '' };

                // Prioritize "Special" statuses (Görev, İzin, FMİ vb.) over generic "Mevcut"
                const specificMatch = matches.find(m => {
                    const s = String(m.status || '').toUpperCase();
                    return s !== 'MEVCUT' && s !== '' && !s.includes('NORMAL');
                });

                return specificMatch || matches[0];
            };

            const getCurrentAttendanceStatus = (personId, date) => {
                const record = getAttendanceRecord(personId, date);
                const status = String(record.status || '').trim();
                const statusUpper = status.toLocaleUpperCase('tr-TR');
                const location = String(record.location || '').trim();
                
                // Improved prioritization for Turkish characters and variants
                const noteUpper = String(record.note || '').toLocaleUpperCase('tr-TR');
                const locUpper = String(record.location || '').toLocaleUpperCase('tr-TR');

                const isExcluded = statusUpper.includes('İZİN') || statusUpper.includes('IZIN') || statusUpper.includes('RAPOR') || statusUpper.includes('İSTİRAHAT') || statusUpper.includes('HASTANE');
                
                if ((statusUpper.includes('BEKLEME') || noteUpper.includes('BEKLEME') || locUpper.includes('BEKLEME')) && !isExcluded) {
                    if (statusUpper.includes('RESMİ') || statusUpper.includes('RESMI') || noteUpper.includes('RESMİ') || noteUpper.includes('RESMI')) {
                        return 'RESMİ TATİL BEKLEME-ANKARA';
                    }
                    return 'BEKLEME-ANKARA';
                }

                if (statusUpper.includes('GÖREV') || statusUpper.includes('GOREV')) {
                    if (location) return `Görevli (${location})`;
                    return 'Görevli';
                }

                if (statusUpper.includes('İZİN') || statusUpper.includes('IZIN') || statusUpper.includes('İDARİ') || statusUpper.includes('FMİ') || statusUpper.includes('FMI')) {
                    return status;
                }

                if (statusUpper.includes('RAPOR')) {
                    return 'Raporlu';
                }

                if (statusUpper === 'DİĞER' || statusUpper === 'DIGER') {
                    if (record.note) return record.note;
                    if (location) return `${status} (${location})`;
                    return status;
                }

                if ((statusUpper === 'MEVCUT' && location) && location) {
                    return location;
                }

                return status || 'Mevcut';
            };

            // Standby detection for form
            const isStandbyDay = useMemo(() => {
                const pid = selectedPerson?.id || formData.personId;
                if (!pid || !formData.date) return false;
                const status = getCurrentAttendanceStatus(pid, formData.date);
                return (status || '').toUpperCase().includes('BEKLEME');
            }, [formData.personId, formData.date, selectedPerson, attendanceRecords, getCurrentAttendanceStatus]);

             const refreshData = async (silent = false) => {
                const prevAttendance = [...attendanceRecords];
                const prevTransactions = [];
                
                // Only clear state on manual refresh to avoid flickers in 1-min automatic syncs
                if (!silent) {
                    setTransactions([]);
                    setAttendanceRecords([]);
                    setLoading(true);
                }

                try {
                    const [resPersonnel, resMain] = await Promise.all([
                        apiCall('get_init_data', {}, PERSONNEL_SCRIPT_URL).catch(e => { console.error("Personnel fetch failed", e); return null; }),
                        apiCall('get_init_data', {}, OVERTIME_SCRIPT_URL).catch(e => { console.error("Main fetch failed", e); return null; })
                    ]);

                    // De-duplicate personnel by ID from both sources
                    const personnelMap = {};
                    const processList = (list) => {
                        if (!list) return;
                        list.forEach(p => {
                            const pid = cleanPersonnelId(p.id || p.ID || p.personId || p.PERSON_ID || p.PERSONEL_ID || '');
                            if (pid) {
                                personnelMap[pid] = { ...p, id: pid };
                            }
                        });
                    };
                    processList(resMain?.personnel);
                    processList(resPersonnel?.personnel);
                    const combinedPersonnel = Object.values(personnelMap);

                    const data = {
                        personnel: combinedPersonnel,
                        transactions: resMain?.transactions || [],
                        attendance: [
                            ...(resPersonnel?.attendance || resPersonnel?.yoklama || []),
                            ...(resMain?.attendance || resMain?.yoklama || [])
                        ]
                    };

                    const normalizeDate = (d) => {
                        if (!d) return '';
                        if (typeof d === 'number') {
                            const date = new Date((d - 25569) * 86400 * 1000);
                            return formatDateLocal(date);
                        }
                        if (d instanceof Date) return formatDateLocal(d);
                        let s = String(d).trim();
                        if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.split(/[T ]/)[0];
                        try {
                            const parsed = new Date(s);
                            if (!isNaN(parsed)) return formatDateLocal(parsed);
                        } catch(e) {}
                        s = s.replace(/\./g, '-').replace(/\//g, '-');
                        const parts = s.split('-');
                        if (parts.length === 3) {
                            if (parts[0].length === 4) return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                            if (parts[2].length === 4) return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                        }
                        return s;
                    };

                    if (data.personnel && data.personnel.length > 0) {
                        const formattedPL = data.personnel.map(p => {
                            const getVal = (obj, keys) => {
                                const normalizeKey = (k) => String(k || '').trim().toUpperCase().replace(/[^A-Z0-9ÜŞĞÇİÖ]/g, '');
                                const objKeys = Object.keys(obj);
                                const normalizedObjEntries = objKeys.map(ok => ({ original: ok, normalized: normalizeKey(ok) }));
                                
                                for (const k of keys) {
                                    const normalizedTarget = normalizeKey(k);
                                    const match = normalizedObjEntries.find(e => e.normalized === normalizedTarget);
                                    if (match) return obj[match.original];
                                }
                                return undefined;
                            };

                            const pid = cleanPersonnelId(getVal(p, ['ID', 'PID', 'PERSON_ID', 'PERSONID', 'PERSONEL_ID', 'PERSONELID', 'KİŞİ ID', 'KISI ID']) || '');
                            const fullNameVal = getVal(p, ['FULL_NAME', 'FULLNAME', 'AD_SOYAD', 'ADSOYAD', 'AD_SOYADI', 'ADSOYADI', 'KISI_ADI', 'KİŞİ_ADI', 'NAME', 'AD SOYAD', 'AD SOYADI']);
                            const titleVal = getVal(p, ['TITLE', 'UNVAN', 'ÜNVAN', 'GÖREV', 'GOREV', 'ROLE', 'UNVANI', 'ÜNVANI', 'GÖREVİ', 'GOREVI']);
                            const photoUrlVal = getVal(p, ['PHOTOURL', 'PHOTO_URL', 'PHOTO', 'RESIM', 'RESİM', 'FOTOGRAF', 'FOTOĞRAF']);
                            const activeUntilVal = getVal(p, ['ACTIVE_UNTIL', 'ACTIVEUNTIL', 'AKTIF_BITIS', 'BITIS_TARIHI', 'PASIF_TARIHI']);

                            return {
                                ...p,
                                id: pid,
                                fullName: fullNameVal,
                                title: titleVal,
                                photoUrl: photoUrlVal || '',
                                activeUntil: activeUntilVal
                            };
                        });
                        setPersonnel(formattedPL);
                        localStorage.setItem('ogm_personnel', JSON.stringify(formattedPL));
                    }

                    let latestTxList = [];
                    if (data.transactions) {
                        const formattedTX = data.transactions.map(tx => {
                            const getVal = (obj, keys) => {
                                const normalizeKey = (k) => String(k || '').trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
                                const objKeys = Object.keys(obj);
                                const normalizedObjEntries = objKeys.map(ok => ({ original: ok, normalized: normalizeKey(ok) }));
                                
                                for (const k of keys) {
                                    const normalizedTarget = normalizeKey(k);
                                    const match = normalizedObjEntries.find(e => e.normalized === normalizedTarget);
                                    if (match) return obj[match.original];
                                }
                                return undefined;
                            };

                            // Unified mapping for all transaction columns
                            return {
                                ...tx,
                                id: getVal(tx, ['ID']),
                                personId: cleanPersonnelId(getVal(tx, ['PID', 'PERSON_ID', 'PERSONID']) || ''),
                                personName: getVal(tx, ['PERSON_NAME', 'PERSONNAME', 'KISI_ADI', 'KİŞİ_ADI', 'NAME']),
                                date: normalizeDate(getVal(tx, ['DATE_L', 'DATE_REF', 'DATE', 'TARİH', 'TARIH'])),
                                endDate: normalizeDate(getVal(tx, ['END_DATE', 'ENDDATE', 'BITIS_TARIHI'])),
                                startTime: getVal(tx, ['START_TIME', 'STARTTIME', 'BASLANGIC_SAATI', 'S_SAATI']),
                                endTime: getVal(tx, ['END_TIME', 'ENDTIME', 'BITIS_SAATI', 'B_SAATI']),
                                hours: parseFloat(String(getVal(tx, ['HOURS', 'SAATLER', 'SURE', 'SÜRE']) || 0).replace(',', '.')),
                                days: parseInt(String(getVal(tx, ['DAYS', 'GUNLER', 'GUN', 'GÜN']) || 1)),
                                description: getVal(tx, ['DESCRIPTION', 'ACIKLAMA', 'AÇIKLAMA', 'ACIKLAMALAR', 'AÇIKLAMALAR']),
                                note: getVal(tx, ['NOTE', 'NOT', 'NOTLAR']),
                                shift: getVal(tx, ['SHIFT', 'VARDIYA', 'VARDİYA']),
                                dayType: getVal(tx, ['DAY_TYPE', 'DAYTYPE', 'GUN_TIPI', 'GÜN_TİPİ']),
                                type: (() => {
                                    const t = String(getVal(tx, ['TYPE', 'TIP', 'TİP']) || '').toUpperCase();
                                    if (t.includes('EARN') || t.includes('KAZAN') || t.includes('FMİ') || t.includes('FMI') || t.includes('MESAİ') || t.includes('MESAI')) return TRANSACTION_TYPES.EARNED;
                                    if (t.includes('USE') || t.includes('KULLAN') || t.includes('İZİN') || t.includes('IZIN')) return TRANSACTION_TYPES.USED;
                                    return t;
                                })(),
                                status: (() => {
                                    const s = String(getVal(tx, ['STATUS', 'DURUM']) || '').toUpperCase();
                                    if (s === 'APPROVED' || s === 'ONAYLANDI' || s === 'ONAYLI' || s === 'MODIFIED') return 'APPROVED';
                                    if (s === 'REJECTED' || s === 'REDDEDİLDİ' || s === 'RETTEDİLDİ') return 'REJECTED';
                                    if (s === 'PENDING' || s === 'BEKLEMEDE') return 'PENDING';
                                    return s || 'APPROVED';
                                })(),
                                createdAt: getVal(tx, ['CREATED_AT', 'CREATEDAT', 'OLUSTURMA_TARIHI', 'TIMESTAMP'])
                            };
                        });
                        latestTxList = formattedTX;
                        setTransactions(formattedTX);
                        localStorage.setItem('ogm_overtime_tx', JSON.stringify(formattedTX));
                    } else {
                        setTransactions(prevTransactions);
                    }
                    
                    let latestAttList = [];
                    if (data.attendance || data.yoklama) {
                        const rawAttendance = data.attendance || data.yoklama;
                        
                        const formattedAttendance = rawAttendance.map(a => {
                            const getVal = (obj, keys) => {
                                const normalizeKey = (k) => String(k || '').trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
                                const objKeys = Object.keys(obj);
                                const normalizedObjEntries = objKeys.map(ok => ({ original: ok, normalized: normalizeKey(ok) }));
                                
                                for (const k of keys) {
                                    const normalizedTarget = normalizeKey(k);
                                    const match = normalizedObjEntries.find(e => e.normalized === normalizedTarget);
                                    if (match) {
                                        const val = String(obj[match.original] || '').trim();
                                        if (val && val.toLowerCase() !== 'null' && val.toLowerCase() !== 'undefined') return val;
                                    }
                                }
                                return '';
                            };

                            const attStatus = getVal(a, ['STATUS', 'DURUM', 'DUTY_TYPE', 'GOREV_TIPI']) || 'Mevcut';
                            const attLocation = getVal(a, ['DUTY_LOC', 'DUTY_LOCAT', 'DUTY_LOCATION', 'GOREV_YERI', 'LOCATION', 'YER']);
                            const dateVal = getVal(a, ['DATE_L', 'DATE_REF', 'DATE', 'TARIH']);
                            const pidVal = getVal(a, ['PERSON_ID', 'PERSONNEL_ID', 'PID']);
                            const attNote = getVal(a, ['NOTE', 'ACIKLAMA', 'DESCRIPTION', 'NOT', 'ACIKLAMASI', 'NOTLAR']);
                            const attDutyType = getVal(a, ['DUTY_TYPE', 'GOREV_TIPI', 'DURUM_TIPI']);
                            const attLeaveType = getVal(a, ['LEAVE_TYPE', 'LEAVE_TYI', 'IZIN_TIPI', 'G_SUTUNU']);
                            const attTransferred = getVal(a, [
                                'YOKLAMA SİSTEMİNE AKTARILDIR MI ?',
                                'YOKLAMA SİSTEMİNE AKTARILDI MI ?',
                                'YOKLAMA_SISTEMINE_AKTARILDIR_MI',
                                'YOKLAMA_SISTEMINE_AKTARILDI_MI',
                                'AKTARILDIR_MI',
                                'AKTARILDI_MI',
                                'AKTARILDI',
                                'AKTARILDIR',
                                'SYSTEM_TRANSFER'
                            ]);
                            
                            return {
                                personId: cleanPersonnelId(pidVal || ''),
                                date: normalizeDate(dateVal),
                                status: attStatus,
                                location: attLocation,
                                note: attNote,
                                leaveType: attLeaveType,
                                isPlanned: String(attDutyType || '').toLocaleUpperCase('tr-TR').includes('PLANLI'),
                                isTransferred: String(attTransferred || '').toLocaleUpperCase('tr-TR').trim() === 'EVET'
                            };
                        }).filter(a => a.personId && a.date);

                        const sortedAttendance = [...formattedAttendance].sort((a, b) => {
                            const getPriority = (rec) => {
                                const us = String(rec.status || '').toUpperCase();
                                let score = 0;
                                if (us.includes('GÖREV') || us.includes('GOREV')) score = 40;
                                else if (us.includes('İZİN') || us.includes('IZIN') || us.includes('İDARİ') || us.includes('FMİ') || us.includes('FMI')) score = 30;
                                else if (us.includes('RAPOR')) score = 25;
                                else if (us.includes('MEVCUT') || us.includes('NORMAL')) score = 10;
                                
                                if (score >= 30 && rec.location && rec.location.length > 1) score += 5;
                                return score;
                            };
                            return getPriority(b) - getPriority(a);
                        });

                        latestAttList = sortedAttendance;
                        setAttendanceRecords(sortedAttendance);
                        localStorage.setItem('ogm_attendance', JSON.stringify(sortedAttendance));
                    } else {
                        setAttendanceRecords(prevAttendance);
                    }

                    // Look for modifications and additions if not the first load
                    if (!isFirstLoad.current) {
                        const addedUniqueAtt = [];
                        const addedUniqueTx = [];
                        const seenAlerts = JSON.parse(localStorage.getItem('ogm_seen_alerts') || '[]');

                        if (latestAttList.length > 0 && prevAttendance.length > 0) {
                            latestAttList.forEach(curr => {
                                const person = personnel.find(p => p.id === curr.personId);
                                if (adminRole && !isPersonnelInGroup(person, adminRole)) return;

                                const prev = prevAttendance.find(p => p.personId === curr.personId && p.date === curr.date);
                                if (!prev) {
                                    const exists = addedUniqueAtt.find(x => x.personId === curr.personId && x.date === curr.date);
                                    if (!exists) {
                                        const alertKey = `att_${curr.personId}_${curr.date}_${curr.status}_${curr.location || ''}`;
                                        if (!seenAlerts.includes(alertKey)) {
                                            addedUniqueAtt.push({ ...curr, isNew: true });
                                        }
                                    }
                                } else if (prev.status !== curr.status || prev.location !== curr.location) {
                                    const exists = addedUniqueAtt.find(x => x.personId === curr.personId && x.date === curr.date);
                                    if (!exists) {
                                        const alertKey = `att_${curr.personId}_${curr.date}_${curr.status}_${curr.location || ''}`;
                                        if (!seenAlerts.includes(alertKey)) {
                                            addedUniqueAtt.push({ ...curr, isNew: false, oldStatus: prev.status, oldLocation: prev.location });
                                        }
                                    }
                                }
                            });
                        }

                        if (latestTxList.length > 0 && prevTransactions.length > 0) {
                            latestTxList.forEach(curr => {
                                const person = personnel.find(p => p.id === curr.personId);
                                if (adminRole && !isPersonnelInGroup(person, adminRole)) return;

                                const currId = curr.id || `${curr.personId}-${curr.date}-${curr.type}`;
                                const prev = prevTransactions.find(t => (t.id || `${t.personId}-${t.date}-${t.type}`) === currId);
                                if (!prev) {
                                    const exists = addedUniqueTx.find(x => x.personId === curr.personId && x.date === curr.date && x.type === curr.type);
                                    if (!exists) {
                                        const alertKey = `tx_${curr.id || currId}_${curr.status}`;
                                        if (!seenAlerts.includes(alertKey)) {
                                            addedUniqueTx.push(curr);
                                        }
                                    }
                                } else if (prev.status !== curr.status) {
                                    const exists = addedUniqueTx.find(x => x.personId === curr.personId && x.date === curr.date && x.type === curr.type);
                                    if (!exists) {
                                        const alertKey = `tx_${curr.id || currId}_${curr.status}`;
                                        if (!seenAlerts.includes(alertKey)) {
                                            addedUniqueTx.push({ ...curr, isStatusChange: true, oldStatus: prev.status });
                                        }
                                    }
                                }
                            });
                        }

                        if (adminRole) {
                            if (addedUniqueAtt.length > 0 || addedUniqueTx.length > 0) {
                                setUpdateNotice({
                                    attendance: addedUniqueAtt,
                                    transactions: addedUniqueTx
                                });
                            } else {
                                showToast("Sistem güncel, yeni veri yok.");
                            }
                        }
                    } else {
                        isFirstLoad.current = false;
                    }
                } catch (e) {
                    console.error("Refresh failed", e);
                    showToast("Güncelleme hatası!", "error");
                    setTransactions(prevTransactions);
                    setAttendanceRecords(prevAttendance);
                } finally {
                    setLoading(false);
                }
            };

            // Auto Refresh Timer (1 Minute Countdown)
            useEffect(() => {
                const interval = setInterval(() => {
                    setCountdown(prev => {
                        if (prev <= 1) {
                            refreshData(true);
                            return 60; // Reset to 1 minute
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Load Initial Data
            useEffect(() => {
                const init = async () => {
                    const savedTransactions = JSON.parse(localStorage.getItem('ogm_overtime_tx') || '[]');
                    const savedAttendance = JSON.parse(localStorage.getItem('ogm_attendance') || '[]');
                    const savedPersonnel = JSON.parse(localStorage.getItem('ogm_personnel') || '[]');
                    const savedAdmin = localStorage.getItem('ogm_admin_role');
                    
                    setTransactions(savedTransactions);
                    setAttendanceRecords(savedAttendance);
                    setPersonnel(savedPersonnel);
                    setAdminRole(savedAdmin);
                    
                    /* 
                    try {
                        await apiCall('sync_auto_transactions', {}, OVERTIME_SCRIPT_URL);
                    } catch (e) {
                        console.error("Initial sync failed", e);
                    }
                    */
                    await refreshData();
                };
                init();
            }, []);

            // Migration: Ensure all transactions have a status
            useEffect(() => {
                if (transactions.length > 0 && transactions.some(tx => !tx.status)) {
                    setTransactions(prev => prev.map(tx => tx.status ? tx : { ...tx, status: 'APPROVED' }));
                }
            }, [transactions]);

            // Filter for Dashboard
            const displayPersonnel = useMemo(() => {
                return personnel.filter(p => {
                    if (p.activeUntil) return false;
                    const title = (p.title || '').toLocaleUpperCase('tr-TR');
                    
                    // Exclude only core Pilot roles if requested, but Serkan Kotan (Technical) must be included.
                    if (title === 'PİLOT' || title === 'PİLOT (BİRİM AMİRİ)') return false;
                    
                    return true;
                });
            }, [personnel]);

            const filteredTransactions = useMemo(() => {
                const seenDuty = new Set();
                const seenStandby = new Set();
                
                // NEW: Inject all virtual transactions from attendance records
                const attendanceVirtual = [];
                attendanceRecords.forEach(record => {
                    const status = String(record.status || '').toLocaleUpperCase('tr-TR');
                    const normStatus = status.replace(/\./g, '');
                    const dateStr = String(record.date || '');
                    const note = String(record.note || '').toLocaleUpperCase('tr-TR');
                    const leave = String(record.leaveType || '').toLocaleUpperCase('tr-TR');
                    const loc = String(record.location || record.DUTY_LOC || '').toLocaleUpperCase('tr-TR');
                    
                    if (!dateStr.startsWith('2026')) return;
                    
                    const pidRaw = String(record.personId || '').trim().toLowerCase();
                    const p = personnel.find(px => {
                        const pxId = String(px.id || '').trim().toLowerCase();
                        return pxId === pidRaw || pxId.replace(/^p/, '') === pidRaw.replace(/^p/, '');
                    });
                    const pid = p ? String(p.id).trim().toLowerCase() : pidRaw;
                    
                    // 1. FMİ Usage (Always 8 hours as per user request, only if transferred/approved)
                    const isStatusIzin = normStatus.trim() === 'İZİN' || normStatus.trim() === 'IZIN';
                    const cleanLeave = leave.replace(/\./g, '').trim();
                    const isLeaveFmi = cleanLeave === 'FMİ' || cleanLeave === 'FMI' || cleanLeave.includes('FMİ') || cleanLeave.includes('FMI');
                    const isTransferred = record.isTransferred === true || String(record.isTransferred || '').toLocaleUpperCase('tr-TR').trim() === 'EVET';
                    const isFmi = isStatusIzin && isLeaveFmi && isStandbyDate(dateStr) && isTransferred;
                    if (isFmi) {
                        attendanceVirtual.push({
                            id: `auto-fmi-${pid}-${dateStr}`,
                            personId: pid,
                            personName: p?.fullName || pid,
                            date: dateStr,
                            type: TRANSACTION_TYPES.USED,
                            hours: 8.0,
                            description: 'YOKLAMADAN AKTARILAN FMİ İZNİ',
                            status: 'APPROVED',
                            isAuto: true
                        });
                        return; // IMPORTANT: Skip other detections for this day if it's FMİ
                    }
                    
                    // 2. Standby detection
                    const dayType = getDayType(dateStr);
                    const isHolidayDate = dayType === DAY_TYPES.HOLIDAY;
                    const descJoint = `${normStatus} ${note} ${loc}`.toLocaleUpperCase('tr-TR');
                    
                    const isExcludedFromStandby = normStatus.includes('İZİN') || normStatus.includes('IZIN') || normStatus.includes('RAPOR') || normStatus.includes('HASTANE') || normStatus.includes('İSTİRAHAT') || normStatus.includes('ISTIRAHAT') || normStatus.includes('KURS');
                    
                    const hasBeklemeInText = normStatus.includes('BEKLEME') || note.includes('BEKLEME') || loc.includes('BEKLEME');
                    const isExplicitHolidayStandby = descJoint.includes('RESMİ BEKLEME') || descJoint.includes('RESMI BEKLEME') || descJoint.includes('TATİL-BEKLEME') || descJoint.includes('TATIL-BEKLEME') || descJoint.includes('RESMİ TATİL BEKLEME') || descJoint.includes('RESMI TATIL BEKLEME') || descJoint.includes('RESMİ TATİL') || descJoint.includes('RESMI TATIL');
                    
                    const isHolidayStandby = !isExcludedFromStandby && hasBeklemeInText && (isHolidayDate || isExplicitHolidayStandby);
                    const isStandby = !isExcludedFromStandby && hasBeklemeInText && !isHolidayStandby;
                    
                    if (isHolidayStandby && isStandbyDate(dateStr)) {
                         attendanceVirtual.push({
                            id: `auto-hstandby-${pid}-${dateStr}`,
                            personId: pid,
                            personName: p?.fullName || pid,
                            date: dateStr,
                            type: TRANSACTION_TYPES.EARNED,
                            hours: 48.0, // This is just a flag, summary loop maps it to 2.0 points
                            description: 'RESMİ TATİL BEKLEME-ANKARA (YOKLAMA)',
                            status: 'APPROVED',
                            isAuto: true
                        });
                    } else if (isStandby && isStandbyDate(dateStr)) {
                         attendanceVirtual.push({
                            id: `auto-standby-${pid}-${dateStr}`,
                            personId: pid,
                            personName: p?.fullName || pid,
                            date: dateStr,
                            type: TRANSACTION_TYPES.EARNED,
                            hours: 24.0,
                            description: 'BEKLEME-ANKARA (YOKLAMA)',
                            status: 'APPROVED',
                            isAuto: true
                        });
                    }

                    // 3. Görev (Duty)
                    const isDuty = normStatus.includes('GÖREV') || normStatus.includes('GOREV');
                    const isPlanned = record.isPlanned === true || String(record.isPlanned || '').toLocaleUpperCase('tr-TR').includes('PLANLI');
                    const isOverseasDuty = isOverseas(loc) || isOverseas(note) || isOverseas(normStatus);
                    if (isDuty) {
                        if (isPlanned) {
                            if (!isOverseasDuty && isPlannedDutySeason(dateStr)) {
                                const [y, m, d] = dateStr.split(' ')[0].split('-').map(Number);
                                const dt = new Date(y, m - 1, d);
                                const isStrictWeekend = dt.getDay() === 0 || dt.getDay() === 6;
                                attendanceVirtual.push({
                                    id: `auto-duty-${pid}-${dateStr}`,
                                    personId: pid,
                                    personName: p?.fullName || pid,
                                    date: dateStr,
                                    type: TRANSACTION_TYPES.EARNED,
                                    hours: isStrictWeekend ? 8.0 : 2.0,
                                    description: 'OTOMATİK PLANLI GÖREV (YOKLAMA)',
                                    status: 'APPROVED',
                                    isAuto: true,
                                    isPlanned: true
                                });
                            }
                        } else {
                            // Plansız (unplanned) Görev - parse hours & shift from note
                            const rawNote = record.note || '';
                            const matchHours = rawNote.match(/SAAT:\s*([\d.]+)/i);
                            const matchShift = rawNote.match(/VARDIYA:\s*(GECE|GUNDUZ|GÜNDÜZ)/i);
                            const finalHours = matchHours ? parseFloat(matchHours[1]) : 8.0;
                            const finalShift = matchShift ? (matchShift[1].toLocaleUpperCase('tr-TR') === 'GECE' ? 'Gece' : 'Gündüz') : 'Gündüz';
                            const cleanNote = rawNote.replace(/\[SAAT:\s*[\d.]+,?\s*VARDIYA:\s*[^\]]+\]\s*/i, '').trim();
                            
                            attendanceVirtual.push({
                                id: `auto-plansiz-${pid}-${dateStr}`,
                                personId: pid,
                                personName: p?.fullName || pid,
                                date: dateStr,
                                type: TRANSACTION_TYPES.EARNED,
                                hours: finalHours,
                                shift: finalShift,
                                description: cleanNote ? `PLANSIZ GÖREV (YOKLAMA) - ${cleanNote}` : 'PLANSIZ GÖREV (YOKLAMA)',
                                status: 'APPROVED',
                                isAuto: true,
                                isPlanned: false,
                                location: loc || ''
                            });
                        }
                    }
                });

                const allTxs = [...transactions, ...attendanceVirtual];
                
                // Sort transactions: manual-override first, then other manual, then auto
                const sorted = allTxs.sort((a,b) => {
                    const aId = String(a.id || '').toLowerCase();
                    const bId = String(b.id || '').toLowerCase();
                    
                    const getPriority = (id) => {
                        if (id.startsWith('manual-override')) return 0;
                        if (id.startsWith('auto-') || id.includes('sync')) return 2;
                        return 1; // Standard manual entries
                    };

                    return getPriority(aId) - getPriority(bId);
                });

                return sorted.filter(tx => {
                    const date = String(tx.date || '');
                    if (!date.startsWith('2026')) return false;

                    const pid = cleanPersonnelId(tx.personId);
                    const dateLocal = formatDateLocal(tx.date);
                    const id = String(tx.id || tx.ID || '').toLowerCase();
                    const isAuto = id.startsWith('auto-') || id.includes('auto-') || id.includes('sync');

                    // If this person has an FMİ record today from attendance, skip any EARNED transactions for this day
                    const normId = (val) => String(val || '').trim().toLowerCase();
                    const hasAutoFmi = attendanceVirtual.some(v => normId(v.personId) === normId(tx.personId) && formatDateLocal(v.date) === formatDateLocal(tx.date) && String(v.id || '').toLowerCase().includes('fmi'));
                    if (tx.type === TRANSACTION_TYPES.EARNED && hasAutoFmi) return false;

                    // Filter out ALL manual/request USED transactions because used leaves should only be calculated/counted/shown
                    // when they are actually synchronized and returned from the attendance sheet (yoklama)
                    if (tx.type === TRANSACTION_TYPES.USED && !isAuto) {
                        return false;
                    }

                    const desc = String(tx.description || tx.DESCRIPTION || '').toLocaleUpperCase('tr-TR');
                    
                    const dayType = getDayType(dateLocal);
                    const isHolidayDate = dayType === DAY_TYPES.HOLIDAY;
                    const hasBeklemeInText = id.includes('standby') || desc.includes('BEKLEME');
                    const isExplicitHolidayStandby = desc.includes('RESMİ BEKLEME') || desc.includes('RESMI BEKLEME') || desc.includes('TATİL-BEKLEME') || desc.includes('TATIL-BEKLEME') || desc.includes('RESMİ TATİL BEKLEME') || desc.includes('RESMI TATIL BEKLEME') || desc.includes('RESMİ TATİL') || desc.includes('RESMI TATIL') || id.includes('hstandby') || id.includes('holidaystandby');
                    
                    const isHolidayStandby = hasBeklemeInText && (isHolidayDate || isExplicitHolidayStandby);
                    const isStandby = hasBeklemeInText && !isHolidayStandby;
                    const isPlannedDuty = id.includes('auto_duty') || desc.includes('OTOMATİK GÖREV') || desc.includes('PLANLI GÖREV') || desc.includes('GÖREV MESAİSİ');
                    const isFmiUsage = tx.type === TRANSACTION_TYPES.USED || desc.includes('FMİ') || desc.includes('FMI') || desc.includes('F.M.İ');

                    // SEASON FILTER (1 May - 31 Dec) for Standby and FMİ
                    if ((isStandby || isHolidayStandby || isFmiUsage) && !isStandbyDate(dateLocal)) return false;

                    // Broaden isDuty to include manual entries that are not standby/planned
                    const isDuty = ((id.includes('auto_duty') || desc.includes('GÖREV') || desc.includes('GOREV')) || (!isAuto && tx.type === TRANSACTION_TYPES.EARNED)) && !isStandby && !isHolidayStandby && !isPlannedDuty;

                    if (isDuty || isPlannedDuty) {
                        const key = `${pid}_${dateLocal}`;
                        if (seenDuty.has(key)) return false;
                        seenDuty.add(key);
                    }
                    if (isStandby || isHolidayStandby) {
                        const key = `${pid}_${dateLocal}`;
                        if (seenStandby.has(key)) return false;
                        seenStandby.add(key);
                    }
                    return true;
                }).map(tx => {
                    // Calculated displayHours/Points for detail view
                    const txId = String(tx.id || tx.ID || '').toLowerCase();
                    const isAuto = txId.startsWith('auto-') || txId.includes('auto-') || txId.includes('sync');
                    const desc = String(tx.description || '').toLocaleUpperCase('tr-TR');
                    
                    if (tx.type === TRANSACTION_TYPES.USED) {
                        const usageHours = parseFloat(tx.hours || (tx.days ? tx.days * 8 : 8));
                        tx.displayHours = usageHours;
                        tx.hours = usageHours;
                        return tx;
                    }

                    const pid = cleanPersonnelId(tx.personId);
                    const person = personnel.find(p => cleanPersonnelId(p.id) === pid);
                    const title = (person?.title || '').toLocaleUpperCase('tr-TR');
                    const name = (person?.fullName || '').toLocaleUpperCase('tr-TR');
                    const isTechnical = ['UÇAK TEKNİKERİ', 'UÇAK TEKNİSYENİ'].some(t => title.includes(t)) && !(name.includes('SERKAN KOTAN') || name.includes('SERKAN KÖTEN'));
                    
                    const dayType = getDayType(tx.date);
                    const isHolidayDate = dayType === DAY_TYPES.HOLIDAY;
                    const mult = getMultiplier(dayType, isTechnical);

                    const hasBeklemeInText = txId.includes('standby') || desc.includes('BEKLEME');
                    const isExplicitHolidayStandby = desc.includes('RESMİ BEKLEME') || desc.includes('RESMI BEKLEME') || desc.includes('TATİL-BEKLEME') || desc.includes('TATIL-BEKLEME') || desc.includes('RESMİ TATİL BEKLEME') || desc.includes('RESMI TATIL BEKLEME') || desc.includes('RESMİ TATİL') || desc.includes('RESMI TATIL') || txId.includes('hstandby') || txId.includes('holidaystandby');
                    
                    const isHolidayStandby = hasBeklemeInText && (isHolidayDate || isExplicitHolidayStandby);
                    const isStandby = hasBeklemeInText && !isHolidayStandby;
                    const isPlannedDuty = txId.includes('auto_duty') || desc.includes('OTOMATİK GÖREV') || desc.includes('PLANLI GÖREV');

                    if (isHolidayStandby) {
                        tx.displayHours = 2.0;
                        tx.hours = 2.0;
                    } else if (isStandby) {
                        tx.displayHours = 1.0;
                        tx.hours = 1.0;
                    } else if (isAuto) {
                        if (isPlannedDuty) {
                             const isWk = (() => {
                                 if (!tx.date) return false;
                                 const [y, m, d] = tx.date.split(' ')[0].split('-').map(Number);
                                 const dt = new Date(y, m - 1, d);
                                 return dt.getDay() === 0 || dt.getDay() === 6;
                             })();
                             tx.displayHours = isWk ? 11.0 : 3.0;
                             tx.hours = isWk ? 11.0 : 3.0;
                        } else if (desc.includes('FMİ') || desc.includes('FMI') || desc.includes('F.M.İ')) {
                             tx.displayHours = 8.0;
                             tx.hours = 8.0;
                             tx.type = TRANSACTION_TYPES.USED;
                        } else {
                             tx.displayHours = parseFloat(tx.hours || 8.0) * mult;
                             tx.hours = tx.hours || 8.0;
                        }
                    } else {
                        tx.displayHours = parseFloat(tx.hours || 0) * mult;
                    }
                    tx.isHolidayStandby = isHolidayStandby;
                    tx.isStandby = isStandby;
                    return tx;
                });
            }, [transactions, attendanceRecords, personnel]);

            // Save Transactions
            useEffect(() => {
                if (!loading) {
                    localStorage.setItem('ogm_overtime_tx', JSON.stringify(transactions));
                }
            }, [transactions, loading]);

            // Save Attendance
            useEffect(() => {
                if (!loading) {
                    localStorage.setItem('ogm_attendance', JSON.stringify(attendanceRecords));
                }
            }, [attendanceRecords, loading]);

            // Calculations
            const stats = useMemo(() => {
                const map = {};
                personnel.forEach(p => {
                    const normId = cleanPersonnelId(p.id);
                    map[normId] = { 
                        earned: 0, 
                        used: 0, 
                        balance: 0, 
                        score: 0,
                        standby: 0,
                        holidayStandby: 0,
                        plannedDutyWeekday: { days: 0, hours: 0 },
                        plannedDutyWeekend: { days: 0, hours: 0 },
                        dutyWeekday: { days: 0, hours: 0 },
                        dutyWeekend: { days: 0, hours: 0 },
                        notesBreakdown: {},
                        breakdown: {
                            [DAY_TYPES.WEEKDAY]: { day: 0, night: 0 },
                            [DAY_TYPES.WEEKEND]: { day: 0, night: 0 },
                            [DAY_TYPES.HOLIDAY]: { day: 0, night: 0 }
                        }
                    };
                });

                const getStandardId = (rawId) => {
                    const clean = String(rawId || '').trim().toLowerCase();
                    if (!clean) return '';
                    const match = personnel.find(p => {
                        const pId = String(p.id || '').trim().toLowerCase();
                        return pId === clean || pId.replace(/^p/, '') === clean.replace(/^p/, '');
                    });
                    return match ? String(match.id).trim().toLowerCase() : clean;
                };

                // Deduping tracker
                const processedDays = {
                    DUTY: new Set(),
                    STANDBY: new Set(),
                    HOLIDAY_STANDBY: new Set(),
                    PLANNED_DUTY: new Set(),
                    USED: new Set()
                };
                const countedUsedDates = new Set();

                // PRE-PROCESS ATTENDANCE RECORDS (Unified)
                // First pass: Identify FMİ days to deduct points and skip duties
                attendanceRecords.forEach(record => {
                    const status = String(record.status || '').toLocaleUpperCase('tr-TR');
                    const normStatus = status.replace(/\./g, '');
                    const dateStr = String(record.date || '');
                    if (!dateStr.startsWith('2026')) return;
                    const pid = getStandardId(record.personId);
                    if (!map[pid]) return;

                    const dayKey = `${pid}_${dateStr}`;
                    if (normStatus.includes('FMİ')) {
                        processedDays.USED.add(dayKey);
                    }
                });

                // Sort transactions: manual first, then auto
                const sortedTxs = filteredTransactions;

                sortedTxs.forEach(tx => {
                    let pid = getStandardId(tx.personId);
                    if (!map[pid] && tx.personName) {
                        const txName = String(tx.personName).trim().toLocaleUpperCase('tr-TR');
                        const matchedPerson = personnel.find(p => String(p.fullName).trim().toLocaleUpperCase('tr-TR') === txName);
                        if (matchedPerson) {
                            pid = String(matchedPerson.id).trim().toLowerCase();
                        }
                    }
                    if (map[pid]) {
                        // YEAR 2026 FILTER ONLY
                        const txDateStr = String(tx.date || '');
                        if (!txDateStr.startsWith('2026')) return;

                        // Only count approved transactions for balance and score
                        const status = String(tx.status || '').toUpperCase();
                        if (status !== 'APPROVED' && status !== 'ONAYLANDI' && status !== 'ONAYLI' && tx.status) return;

                        const txId = String(tx.id || tx.ID || '');
                        const isAuto = txId.startsWith('auto-') || txId.includes('sync');
                        const descUpper = String(tx.description || tx.DESCRIPTION || '').toLocaleUpperCase('tr-TR');
                        const txLoc = String(tx.location || tx.DUTY_LOC || tx.LOCATION || '').toLocaleUpperCase('tr-TR');
                        const txNote = String(tx.note || tx.NOTE || '').toLocaleUpperCase('tr-TR');
                        const dateStr = String(tx.date || '').split(' ')[0];
                        const dayType = getDayType(dateStr);
                        const isHolidayDate = dayType === DAY_TYPES.HOLIDAY;
                        
                        // YURT DIŞI / OVERSEAS exclusion
                        if (isOverseas(txLoc) || isOverseas(descUpper) || isOverseas(txNote)) return;
                        if (descUpper.includes('YURT DIŞI') || descUpper.includes('YURTDIŞI') || descUpper.includes('OVERSEAS') || txNote.includes('YURT DIŞI') || txNote.includes('YURTDIŞI') || txNote.includes('OVERSEAS')) return;

                        // Classification
                        const hasBeklemeInText = txId.toLowerCase().includes('standby') || descUpper.includes('BEKLEME');
                        const isExplicitHolidayStandby = descUpper.includes('RESMİ BEKLEME') || descUpper.includes('RESMI BEKLEME') || descUpper.includes('TATİL-BEKLEME') || descUpper.includes('TATIL-BEKLEME') || descUpper.includes('RESMİ TATİL BEKLEME') || descUpper.includes('RESMI TATIL BEKLEME') || descUpper.includes('RESMİ TATİL') || descUpper.includes('RESMI TATIL') || txId.toLowerCase().includes('hstandby') || txId.toLowerCase().includes('holidaystandby');
                        
                        const isHolidayStandby = hasBeklemeInText && (isHolidayDate || isExplicitHolidayStandby);
                        const isStandby = hasBeklemeInText && !isHolidayStandby;
                        
                        const isPlannedDuty = txId.includes('auto_duty') || descUpper.includes('OTOMATİK GÖREV') || descUpper.includes('PLANLI GÖREV') || descUpper.includes('PLANLI GOREV') || descUpper.includes('GÖREV MESAİSİ') || descUpper.includes('GOREV MESAISI');
                        const isAutoDuty = txId.includes('auto_duty');
                        // Broaden isDuty: include manual earned entries that aren't standby or planned duty
                        const isDuty = (isAutoDuty || descUpper.includes('GÖREV') || descUpper.includes('GOREV') || (!txId.startsWith('auto-') && tx.type === TRANSACTION_TYPES.EARNED)) && !isStandby && !isHolidayStandby && !isPlannedDuty;

                        // FILTER BY SEASON (1 May - 31 Dec)
                        const inSeason = isStandbyDate(dateStr);
                        if ((isStandby || isHolidayStandby) && !inSeason) return;

                        // Filter Duty entries by season ONLY if they are auto-synced
                        if (isDuty || isPlannedDuty) {
                            if (isAuto && !isPlannedDutySeason(dateStr)) return;
                        }

                        // Unified Duty classification
                        const isAnyDuty = isDuty || isPlannedDuty;
